body:
  text: 富鄭公熙寧間鎮亳州迎致頴州華嚴禪苑顒禪師獲聞心法及致仕居洛以頌述志寄顒得法之師姑蘇圓照禪師曰親見顒師悟入深夤緣傳得老師心東南謾説江山遠目對靈光與妙音仍有書曰弼留心祖道為日已久常恨不遇明眼人開發蒙陋雖久聞盛德而無由瞻謁昨幸出守亳社與頴州接境因里人張北部景山請得顒師下訪相聚幾一月以慈悲方便之力令有悟處會結夏逼日四月初遽且歸頴其於揩磨淘汰則殊未有功衰病相仍昏鈍難入昔古靈師所謂不期臨老得聞極則事見之於弼今日矣天幸天幸弼雖得法於顒師然本源由老和尚而來宗派甚的必須亦欲成持更望垂慈攝受遠賜接引未至令至即為南嶽下龐蘊百丈下裴休何以異哉公之貴極人臣頓明此道可謂沒量大人矣又能講法義於圓照敘陳宗派援古靈師臨老得聞極則事以自謂豈欺人哉蜀僧祖秀字紫芝蚤以文鳴於士大夫間慕嵩明教之風著歐陽文忠公外傳蘇養直庠為序冠其首略曰君子以佛之教不見證於堯舜禹湯之世而孔子孟軻之後歷代先儒雖當國不少禁亦聽其橫流宇內古今持此論者有矣獨秀公以謂堯之丹朱不足以授政而禪舜舜亦憂商均而禪禹至湯武革命斯教之所始使孔子行事亦何以異此由堯迄武王佛未誕生有以也成康既沒佛於是顯迹然而未被中華以俟聖人生於魯集大成於古帝王之教也甚矣聖人困於魯衛陳宋欲居九夷乘桴浮海當是時以外數萬里之教加于中國天子諸侯疇聽之哉佛之法不苟傳非顯宗感而求諸遠恐未能速應耳此皆秀公京師之書其駭古震今之論溢數萬言特未傳於世又秀嘗讚東坡像曰漢之司馬楊王唐之太白子昂是五君子者皆生乎蜀郡未若夫子而有耿光夫子之詩抗衡者其唯子美夫子之文並軫者其唯子長賦亦賢於屈賈字乃健於鍾王此夫子之絶技蓋至道之秕粳夫子之道是為后稷伊尹可以致其君於堯湯時議將加之於鈇鉞而夫子尤諷於典章海表之遷如還故鄉信蜀郡之五傑者莫得窺夫子之垣墻秀之言論風旨不特此而已嘗一臠可以知鼎味也靖康初秀尚留京師著華陽宮記極為詳備其東都事略以為朱勔傳讚蓋勔董役讀之者所謂壽山艮嶽則昭然矣豈待寄目耶張丞相德遠判福唐致秀住長樂光嚴蘭若後歸老蜀山翛然燕處一話一言未嘗忘衛宗護教既福不逮慧為時論所惜焉新淦東山吉禪師閩人佛照光公受業師也道學充茂談辨灑落高明士夫喜與之過從有李朝請者乃薌林居士之舅氏嘗偕薌林謁之語道李曰家賊惱人時如何吉曰誰是家賊李豎起拳吉曰賊身已露李曰和尚莫荼糊人好吉曰贓證現在李愕眙不薦吉衝口成偈曰家賊惱人孰如何千聖回機只為他遍界遍空無影迹無依無住絶籠羅賊賊猛將雄兵收不得疑殺天下老禪和笑倒閙市古彌勒休休不用將心向外求回頭瞥爾賊身露并贓捉獲世無儔世無儔真可仰從茲不復誇技倆怙怙安家樂業時萬象森羅齊撫掌吉又嘗以二頌發揮德山臨濟棒喝之旨曰入門便棒七顛八倒匝地普天一時勘破入門便喝夜叉羅剎大地山河一時惡發吉乃道場山琳公之嗣晚於南閩首衆開元就雲堂午齋次説偈曰八十四年老比丘萬般施設不如休今朝廓爾忘緣去任聽橋流水不流遂泊然而逝其臨大變殊異如此仁宗皇帝以皇祐四年十二月九日遣中使降御問於淨因大覺禪師懷璉曰才去豎拂人立難當璉方與衆晨粥遂起謝恩延中使粥粥罷即以頌回進曰有節非干竹三星繞月宮一人居日下弗與衆人同於是皇情大悅既而復賜頌曰最好坐禪僧忘機念不生無心焰已息珍重往來今璉和而進之曰最好坐禪僧無念亦無生空潭明月現誰説古兼今于時華嚴隆公嘗謂璉即心是佛頌乃虗空釘橛然璉公仰酬御問應機而然隆公言之亦各有旨哉黃龍南禪師平時見學者來必問生緣佛手驢腳故叢林目為三關亦嘗自作三頌發明其旨世只傳其佛手驢腳而遺却生緣廬山圓通旻公乃黃龍法孫於南嶽廣辨首座處見南公親筆三頌曰我手佛手兼舉禪人直下薦取不動干戈道出當處超佛越祖我腳驢腳並行步步踏著無生會得雲收日卷方知此道縱橫生緣有語人皆識水母何曾離得蝦但見日頭東畔上誰能更喫趙州茶若以林間録所載佛手驢腳頌校辨之本十有一字不同無乃先後改更而然且如南公頌勘婆話呈慈明尚以有沒字見工拙由是而觀豈無優劣哉舂陵有水曰濂周公茂叔先世所居既樂廬山之幽勝而築室則以濂名其溪蓋識不忘本矣于時佛印禪師元公寓鸞溪之上相與講道為方外友由是命佛印作青松社主追白蓮故事嘉祐中公通守贛上尋有譖公於部使者臨之甚威公處之超然佛印聞而述廬山移文寄之曰仕路風波盡可驚唯君心地坦然平未談世利眉先皺才顧雲山眼便明湖宅近分堤柳色田齋新占石溪聲青松已約為禪社莫遣歸時白髮生公未歸間復趣之曰常思湖口綢繆別又憶匡廬爛漫遊兩地山川頻在目十年風月淡經秋仙家丹藥誰能致佛國乾坤自可休況有天池蓮社約何時攜手話峰頭公雖為窮理之學而推佛印為社主苟道之不同豈能相與為謀耶廬山湯泉在山南為小剎熙寧間禪公住持叢林亦雍肅因舉南泉同歸宗麻谷去禮覲國師路次於地畫一圓相云道得即去宗便於相中坐谷便作女人拜泉云與麼則不去也宗云是甚麼心行泉於是喚回禪乃頌曰獨掌不浪鳴靈光各自有梵剎一才興大家出隻手大慧老師再董徑山因勉學徒持鉢亦嘗舉此禪公乃真淨之嗣云仰山小釋迦住豫章觀音僧齊己為總轄庶務有粥疏曰粥名良藥佛所讚揚義冠三檀功標十利更祈英哲各遂願心既備清晨永資白業昔刊于石既經建炎兵火無復存矣豫章職方乘但云詩僧齊己粥疏己之所書文墨可觀不收其詞今禪林晨粥唯唱前四句且不知誰作也己世姓胡潭之益陽人幼捐俗於大溈依祐公蓋與寂公為同門友其後居西山金鼓而示寂塔尚存龍盤乃其書堂元祐間馬都運醇有小詩題院壁曰支遁逍遙不我逢等間下馬憩蓮宮欲詢齊己幽栖事七十山僧兩耳聾慈照禪師聰公住襄州石門請待制查公為撰僧堂記曰乾明寺者去郡百里古曰石門因勑易之高山崚谷虎豹所伏岐路磽確人煙敻絶非志于道者罔能栖其心也遊官之徒羇束利名雖觀其勝絶而罕能陟其境道守郡日知有學者法字守榮自雍熙三年參尋而至後安禪之堂卑隘隳壞於是發心重構克堅其志聚落求化多歷年所召良工市美材迄景德三年始告成凡五間十一架春有學徒慧果攜錫至京請余識之將刊于石乃書曰自佛法廣被達磨西來具信根者求證本源星居曠野蔽身草木衣不禦寒食不充腹及正法漸漓人法替怠百丈禪師乃營其棟宇以安老病邇來禪剎競構宏壯少年初學恣臥其間殊不知化緣者勞形苦骨施財者邀福懺罪明因果者如臥鐵牀若當冤敵自非朝夕密密增長聖胎其次親善知識者志求解脫可以暫容其形龍神攸護其或心汩蓋纏身利溫暖不察無明不知命縮唯記語言自謂究竟韶盡遷謝墮彼惡趣丈夫猛利得不動心者哉榮公生鳳翔虢邑出家於雍州鄠縣白雲山淨居禪院大中祥符二年四月八日記世之所傳只從佛法廣被至得不動心者哉而止矣所以黃太史答芝曇秀手簡曰查公前朝名士遊楊文公王文惠公之門參禪學道有氣息者也然此僧堂記恐尚有首尾耳公早參琅邪覺禪師躬事薪水因琅邪示以注三祖信心銘於上大寫一句而下細寫一句至數句之後豁然悟旨覺遂告之曰老僧一期描畫虗空直須吐却始得妙喜老師嘗謂大觀間聞太平州耆宿言其如此佛心禪師才公始於受業院襲聲梵應時俗因如城置法器遇一叟語之曰汝自是法器何用更他覔才忽猛省即趨西禪法席聞方丈海印隆禪師云平生睡不落人前起不落人後遂竊慕焉及見老宿達道者看經至一毛頭獅子百億毛頭一時現才指問曰一毛頭獅子作麼生得百億毛頭一時現達曰汝乍入叢林豈可便理會許事尋又問以不在內不在外不在中間此何理哉達使其自看才由是凡出入門必跨定其限默思不在內外中間却在那裏其純誠若此于時西禪衆逾萬指才發心領淨頭職一夕汛掃次隆適夜參至則遇結座擲拄杖云了即毛端吞巨海始知大地一微塵才豁然有省及出閩造豫章黃龍山與死心禪師機不契乃參靈源禪師凡入室出必揮淚自訟曰此事我見得甚分明只是臨機吐不出若為奈何靈源知其勤篤告以須是大徹方得自在也居無何竊觀鄰案僧讀曹洞廣録至藥山採薪歸有僧問甚麼處來山曰討柴來僧指山腰下刀曰鳴剝剝是箇甚麼山刀作斫勢才忽欣然摑鄰案僧一掌揭簾趨出寮門衝口説偈曰徹徹大海乾枯虗空迸裂四方八面絶遮欄萬象森羅齊漏泄才之生緣長溪縣出世南嶽上封歸閩住東山大乘福清靈石後遷鼓山而示寂其為人褊急叢林蚤目之為才煎云丞相張無盡居士平居與廬山東林照覺總禪師為方外侶元豐辛酉秋以序送羽士蹇拱辰字翊之往參問於總曰成都道士蹇翊之來言於余曰吾鄉羽衣之族世相與為婚姻娶妻生子與俗流無異拱辰因觀道藏神仙傳記翻然覺悟當吾血氣剛強視聽聰明喔咿哇嗚順吾耳青黃赤白炫吾目甘脆膏腴爽吾口馨香馥烈適吾鼻滑澤纖柔佚吾體歡欣動蕩感吾意此六寇者乘吾瞀亂晝夜與吾相親而未嘗相釋也一旦吾之形耗而羸氣耗而衰精耗而萎神耗而疲八風寒暑之所薄百邪鬼祟之所欺陰魄欲沈陽魂欲飛則六寇者曾莫吾代而天下之至苦吾獨當之房闥之戀莫如婦血肉之恩莫如女拱辰於是悉囊中之所有與之而謝去紿以他事出遊百里遂泛涪江下濮水歷縉雲出塗山訪岑公之洞府瞻神女之祠觀而達於渚宮也將泛九江入廬山結茅於錦繡之谷長嘯乎香爐之頂撫陶石以遙想挹遠溪以濯足蓋吾之術以性為基以命為依始乎有作終乎無為竊聞先生究離微之旨窮心迹之歸奏無絃之曲駕鐵牛之機故不遠而來見先生也當試為余言之余曰壯哉子之志乎難行能行難棄能棄吾弗及子矣余適有口疾不能答子吾有方外之侶曰常總居於東林必能決子之疑請持吾之説而往問之噫無盡不指蹇見道家流而指往東林厥有旨哉徑山明禪師紹興辛酉隨侍大慧老師過衡陽日化於市以贍菴衆須一繩為率癸亥秋辭往浙西持鉢期明年上元回大慧以偈送之曰藞苴明大禪孟浪絶方比識得玄中玄作得主中主赤腳走長街一日數百里色力既勇猛殊不畏寒暑如是二三年日日只如此人皆謂渠狂渠只笑而已秋陽方熾然忽來辭妙喜持鉢入閙市普化乃知己肩橫楖𣗖杖其興不可止臨行贈汝言汝令須記取甲子上元前却要到這裏仍求得大慧像讚曰直饒畫得十分猶是真常流注普化倒翻筋斗𭺗著了明癢處有箇末後句當機難禁制咄且不要絮明道貌豐碩氣宇雄邁應機施設必以法為樂故得叢林大禪之譽至於偈頌多率爾而成亦有新意隆興元年春自莊山被旨住徑山由廣德軍開法院僧首宗儼求頌發揮其修造明掇筆書曰這箇儼僧首靈機常在手𡎺著磕著處塞却娘生口言外領略得三三不成九僧首如是傳大作獅子吼諸佛亦如是喝下須彌走做起參天大梵剎千年萬歲摩星斗今徑山姑蘇別業歲入二萬斛乃明化於楊和王府未幾而示寂既撰田記明無與焉昔韓昌黎奉詔撰平淮西為李訴部卒石孝忠推仆以其紀功不及於訴以是方於田事大略相似惜叢林無孝忠之作耳豫章東山僧修演里中劉氏子得法於石門謙公有偈曰未悟之日要參禪一見石門便坦然蒙師指箇真消息方知鹽鹹醋是酸自爾修杜多行常於夏夜裸體以飼蚊蚋有施與衣則受而轉濟無者亦嘗説偈見意曰四十年來常跣足不剃頭兮不澡浴郡官為我換衣衫只恐平生願不足以故世稱為劉道者居無何告其徒曰吾將入定可以甎泥為護須三年後與汝相見及期果出定顯化異常落成梵宇至天禧二年歲餘二日復將入定遂囑徒屬以四十九寒暑當啓吾壙即瞑目焉治平三年如其所囑之數由是寺僧以其事聞於太守程公闢率僚屬就視而趺坐儼然遂傅以香泥奉安佛殿之西廡以應民庶祈禱夫演公悲願宏深而能回首塵勞曲開方便如此福州鼓山於紹興之初刊行古尊宿語録二十有二洪之翠嵓芝禪師者其一焉芝開堂於郡城有問如何是洪州境答曰滕王閣下千峰秀孺子亭前薄霧生又問如何是境中人答曰出入敲金鐙朱衣對錦屏其刊本漏却答境一聯與問人一句乃以對人而酬境其顛錯若此紹興甲子逮今模印流通天下不知其幾許遂使標志此道者不見古人大全可不惜哉西蜀釣魚山回禪師早為石工而有契證故叢林目之為回石頭蜀之名士馮當可唐文若與數客語論次舉孔子曰由誨汝知之乎知之為知之不知為不知是知也回緘默靜聽徐曰古人意莫不如此坐客駭異且命回釋其大意回即説偈曰會得知之為知之步步踏著上天梯叵耐古人無意智剛惹間人説是非舉座傾服後馮公當可敘回語録曰五祖晚得南堂慥暴生獰凌跨勤遠天遒地窄投老大隋回道者以運鎚攻石之手仰擊堅高出力既粗一鎚便透歸坐釣魚山下乖崖峭壁十倍其師狼毒砒霜不容下口其徒彥文更不瞥地要取餘毒散施諸方余恐後人不著便宜自取僵仆故為敘引以冠前文紹興間卍菴顏公自徑山首衆歸蜀經釣魚山值回為衆入室顏直前酬酢而出少頃回詢於衆曰適來黥面僧子安在有識顏者曰其僧乃徑山顏首座已登舟矣回使侍者邀顏上山講叢林之禮顏嘗為劇寇虜而黥面也錢塘僧道潛者以詩見知於蘇文忠公號其為參寥子凡詩詞迭唱更和形於翰墨必曰參寥及呂丞相為奏妙總師名之後與簡牘則曰妙總老師江浙石刻具存者多今略記公離錢塘以長短句別之曰有情風萬里卷潮來無情送潮歸問錢塘江上西興浦口幾度斜暉不用思量今古俯仰昔人非誰似東坡老白首忘機記取西湖西畔正暮山好處空翠煙霏算詩人相得如我與君稀約他年東還海道願謝公雅志莫相違西州路不應回首為我沾衣噫今世之小生於有道宗師必名呼而示其忽慢亦安知文忠於一詩僧尚爾況道德崇重者耶白雲端和尚住潯陽能仁新其堂與厨略記其實曰古之稱善知識者蓋專以祖法為務旦夕坐於方丈間應諸學者之問而決疑焉若院之事則有學者分而集之故善知識之稱得其實而有尊矣愚嘉祐丙申孟夏自圓通應命來繼茲席雖不揆其實而至且患其法堂厨舍悉皆頽圮有風雨不堪之憂何足以容衆而繼人之後者哉已而得州人周氏懷義大新其堂明年有慕藺來者又新其厨然後風雨不足憂而徒衆得以安焉周氏素達於吾教不欲書以自顯愚謂厨資出諸遠近之人不書之無以嘉其善乃併以二善刻於厨壁噫考於古之稱善知識者之義愚尚有愧焉己亥九月十七日住持沙門守端述石刻既毀前輩典刑無復見矣今立根椽片瓦便彰飾説邀功歸己欺於後世安肯自書其愧耶待制韓公子蒼與大慧老師厚善及公僑寓臨川廣壽精舍大慧入閩取道過公館於書齋幾半年晨興相揖外非時不許講行不讓先後坐不問賓主蓋相忘於道術也故公詩有禪心如密付更為少淹留之句公因話次謂少從蘇黃門問作文之法黃門告以熟讀楞嚴圓覺等經則自然詞詣而理達東坡家兄謫居黃州杜門深居馳騁翰墨其文一變如川之方至後讀釋氏書深悟實相參之孔老博辨無礙浩然不見其涯故為其載於墓志隆興改元仲夏東萊呂伯恭登徑山謁大慧為兩月留大慧語及韓公得斯論於蘇黃門伯恭亦謂聞所未聞也右街僧録慈雲大師善因以政和五年夏詣廟堂陳詞曰伏為教門於四月十六日奉聖旨指揮為道録董南運訴釋教所有毀漢天師等事下有司取藏經見行撿尋焚毀次今不避冒瀆朝廷輒有陳述切緣天下寺院大藏經文元係太祖太宗聖旨雕造印行流通及都城寺院并后妃之家功德院藏經又係本朝所賜其辨正論嘗蒙仁宗皇帝收入崇總録若御府之書遽然焚毀在臣子之心有所不忍恭惟國家功成治定政教興隆崇奉祖宗凡所舊書未聞焚毀只如揚子捶提仁義滅絶禮學之言世人謂之指斥老氏莊子作盜跖漁父之篇世人謂之毀擯孔聖然而老子之道愈興孔子之教益著此所以孟子有戒盡信書之言也明矣豈非毀之者適所以尊之今道教中有輔正除邪等論毀斥釋氏切害甚多而教門未嘗取乞除毀伏望鈞慈特賜詳察使釋道二教不許互相排詆以專柔無諍為事各守一道上助清朝興化之萬一乞特降朝旨禁止引用斥道教之言免焚毀藏經則天下幸甚由是廟堂奏聞至六月十一日奉聖旨依奏嗚呼靖康之亂推原其端實由林靈素之徒私於快己黷紊朝綱卒致生民墮於塗炭悲夫廬山羅漢系南禪師臨汀張氏子母妊時夢烈丈夫擐金甲巡行庭隅遂詰其由對以有善知識寄生汝家故來衛護耳逮生而恃怙拊抱即啼遂從保母乳育甫十歲依金泉院僧德廉出家廉於俗則伯父也雖距里閈不遠閲三霜未嘗歸省適其父攜世味與廉講手足之敬南悵然曰清淨伽藍以葷茹穢污其可耶廉聞而詬其禮違敬順深加屏斥于時役者踈剪庭柏南衝口成洗柏偈以見意曰兩株寒柏種階前翠葉靈根漸次堅自稟萬年高操在等間霜雪莫相煎廉駭異之至年十九占僧籍因與同院僧海評為檀越禮梁武懺忽感慨謂評曰佛菩薩既是吾徒之祖悉不能知其從來至於讀懺文字句尚差況奧義乎今肖類以為胤嗣寧無愧心耶既而謁郡之開元潭公賞月次潭使其徒著語以見志南遽應曰中秋十五夜明月碧溪流不獨鄞江上光充四百州潭欣然謂其未易量也尋出遊江國首造廬陵隆慶間公之室次詣仰山偉公咸器重焉元豐己未至長沙道林參禮祐禪師於言下疑情頓釋祐既謝院事隨侍氐廬嶽逮元祐丙寅祐住羅漢南輔相建立叢林雄冠江表祐因告老南繼其席則年三十有九處事撫衆風規峻整道譽四馳閲于七白忽升堂告衆曰羅漢今日倒騎鐵馬逆上須彌踏破虗空不留朕迹乃歸方丈跏趺而逝實紹聖改元甲戌門人行初托其事命蜀僧允平紀次可謂備矣續僧寶傳以南為首既不得其詳無乃摸象耶池州梅山愚丘宗禪師因練塘居士洪慶善持江東使節夜宿山間相與夜話洪問以飯僧見於何經其旨安在宗曰四十二章經有云飯惡人百不如飯一善人乃至飯千億三世諸佛不如飯一無住無作無證之者其無修證則是正念獨脫能飯斯人則功超諸佛然前輩知此旨者多矣洪曰其為誰乎宗曰且以近説如秦少遊滕州貶所自作挽章有誰為飯黃緇之句東坡既聞秦計以書送銀五兩囑范元長為秦飯僧及東坡北歸至毗陵以疾不起太學生裒錢於東京慧林飯僧蘇黃門撰東坡墓志首載之洪曰嚫金有據乎宗曰公豈不見毛詩小雅鹿鳴燕羣臣嘉賓也既飲食之又實幣帛筐篚以將其厚意蓋飲食不足以盡敬而加贈遺以致殷勤也於是為誦丁晉公齋僧疏曰佛垂遍智道育羣生凡欲救於傾危必預形於景貺謂白衣干祿叨冢宰之重權丹陛宣恩忝先皇之優渥補仲山之袞曲盡巧心和傅説之羹難調衆口嘗於安寢忽夢清容妙訓泠泠俾塵心而早悟真儀隱隱恨凡目以那知蓋智未周身事乖遠害至禍臨而莫測成災及以非常黜向西京感聖恩而寬宥竄於南裔當忠憲以甘心咎實自貽孽非他作念一家上散地望萬里以何歸既為負國之臣永絶經之術程遊湘土道假靈山正當煩惱之身忽接清涼之衆方知富貴難保始終直饒鼎食之榮豈若盂羹之美特形歸命恭發精誠虔施白金充修淨供飯苾芻之高德答懶瓚之深慈冀保此行乞無他恙伏願天回南眷澤賜下臨免置邊夷白日便同於鬼趣賜歸中夏黃泉再感於天恩虔罄丹誠永繄法力洪曰向讀名臣傳只見補仲山袞和傅説羹一聯而已今獲全聞其精禱若此黃龍死心禪師因蜀僧泉法湧入室次死心曰聞汝解吟詩試吟一篇泉曰請師題目死心豎起拂子泉曰一句坐中得片心天外來死心曰川藞苴落韻了也泉曰杜撰試官如麻似粟拂袖而出無何死心有語曰黃龍長老觸著煩惱若論心地紅日杲杲有易觸著煩惱為無頭無腦者死心聞而怒詬泉曰此正與老師出光彩死心曰川僧休來胡脛泉曰祖師偈云真性心地藏無頭又無尾亦胡脛耶死心不覺解顏死心嘗讚六祖曰六祖當年不丈夫倩人書壁自塗糊明明有偈言無物却受他家一鉢盂是時依其韻而和者亦衆死心復次元韻酬泉曰絶句精明勝丈夫出言吐氣不麻胡須知得意如流水笑殺黃梅爭鉢盂泉尋以頌辭別有祖意西來我不知之句死心即拈其句送之曰祖意西來我不知知時未得入離微離微徹了離微旨始信心源獨自歸雪竇持禪師嗣象田卿公乃東林照覺之孫平居偈頌衝口而成其賦紙帳曰不犯條絲不涉機細揉霜楮淨相宜半軒秋月難分夜一榻寒雲未散時睡去浩然忘混沌坐來虗白稱無為綿綿不許纖塵入任汝風從八面吹又假山曰數拳幽石疊嵳峨池水泓然一寸波識得山川無限意目前蕭灑不消多又間居曰年來趨世勿心情閣錫孤峯計已成快活有時無奈何繞松長嘯兩三聲大慧老師前住徑山法席雄盛諸山未嘗敢有登其門者獨持造謁大慧為上堂講法眷之禮相與觀畫工圖臨濟像次持且欲傳其本大慧令為揎肘作𡎺拳之勢持遂命為讚曰面似淋了灰堆喝似旱天怒雷雖然粗粗慥慥且不隈隈𣯧𣯧咄是甚麼若不得這箇道理定作一枚渠魁其後諸方有畫頂相效顰作露肘握拳之狀未免取誚識者持公尤善滑稽談對峻捷有范生乃攫士之雄者入寺叨餮不已范一日飯罷摩腹而行持問以腹有疾耶范遽言忝從事於道家流養生之訣所謂飯了行百步急以手摩肚持即應之曰儞要學長生不易我常住由是范慚而退遂不復至矣龍牙禪師諱從密字世踈以草聖為世所珍舒人張懷素自號落魄野人以幻術遊公卿間崇寧四年懷素謀反事敗陵遲處斬檢其橐有密草書洪公覺範跋其後由是二公連纍獲譴密後歸閩因有偈曰長汀有箇老頭陀猛省思量惡業多怕老人中添白髮驚翻浪裏走黃河天涯海角藏身去劒樹刀山眨眼過今日南歸猶活在從他笑不似禪和嘗有四大頌曰地風火水本無根今藉其元作爾尊六用停時人不見一機空處我何存休於燥濕尋宗祖勿向堅搖認子孫記得曾郎言諦當都盧似箇破沙盆密晚住福之東禪一日招鄭編修尚明飯手自瀹茗乃曰某大事到來屈公證明又云曾得某草書千字文否鄭云未蒙見貺師乃命筆草千字大勝平時所作又索紙書偈云閲盡人間七十秋萬緣今日一時休虗空撲破渾間事驚起全身露地牛投筆而逝茶毗煙所至處皆五色舍利衡州花藥英禪師江之湖口李氏子也初於真淨處受記莂乃往雲居佛印命首衆僧一日佛印握拳問曰首座如何英曰他日不敢忘和尚佛印私以為喜有偈遺之曰誰人識得吉州英觜是新羅鐵打成終不隨他烏鵲隊望雲間呌兩三聲蓋美其機辨矣由是叢林呼為英鐵觜紹聖元年秋於雲居受潭之開福命而為真淨之嗣自是歲之冬夏必致安問而獻衣須戒去僕候孟朔投書然真淨殊無物為報唯臨遷寂囑付黃伽梨英既得訃受衣哀號仆地大慧老師稱其如此且謂於師篤法義未有過英鐵觜者熙寧間西湖有僧清順字怡然居湖山勝處往來靈隱天竺以偈句陶寫間中趣味曰浪宕間吟下翠微更無一法可思惟有人問我出山意藜杖頭挑破衲衣又曰事事無能一不前喜歸天竺過殘年飢餐困臥無餘事休説壺中別有天石林葉丞相少蘊謂順為人清約介靜不妄與人交無大故不至城市士大夫多往就見時有饋之米者所取不過數斗以瓶貯置几上日三二合食之雖蔬茹亦不常有東坡在嶺南時因人往西湖有筆語曰垂雲順闍梨乃余監郡日往還詩友也清介貧甚食僅足而已幾於不足也然未嘗有憂色老矣不知尚健不噫今吾黨以清貧為耻以厚蓄為榮及溘然則不致其徒於縲紲者幾希若使其少慕順之風豈至遺臭耶汪翰林彥章牧苕溪時於道有聞晚之歎遇休沐日必會諸山長老道話因思溪慈受道場普明何山佛燈坐于書齋其壁間有布袋和尚像蓋名畫也公遂指而問諸山曰畫得如何慈受曰此可謂出新意於法度之中寄妙理於豪放之外者公曰他還會禪否佛燈曰不會公曰為甚麼不會佛燈曰會則不問也公於是大笑苕溪鄭禹功參道於佛燈亦嘗言之嚴陽山在武寧縣東南四十里有趙州和尚嗣法上首諱善信者樂山之奇秀結庵其間信以道德崇重世不欲名故稱嚴陽尊者二虎一蛇馴繞左右尊者嘗問趙州一物不將來時如何趙州曰放下著尊者曰既是一物不將來又放下箇甚麼趙州曰放不下便擔取去黃龍南禪師有頌發揮之曰一物不將來肩頭擔不起言下忽知非心中無限喜毒惡既忘懷蛇虎為知己光陰幾百年清風猶未已唐天祐間江西制置劉公於縣治之西創新興院迎尊者居焉僧致問曰如何是新興水答曰面前江裏今院之額改為明心國初有僧道寧於尊者祠堂作分書寫尊者送僧偈大觀中尚存敗壁間曰身如雲兮貌如祖及至身中無伴侶楖𣗖橫擔不顧人直入千峯萬峯去今叢林唯誦後二句亦不知為誰作至於傳燈録遺脫尊者之名誠可大息也大慧老師以大觀丁亥時年十有九經大平州隱靜與二僧遊杯渡菴有犬逸怒吠二僧懼而返大慧徑前犬則如迎宿客而菴之主僧延遇特厚大慧曰某甲晚生豈足以當盛意主僧顧伽藍土偶而言曰昨宵將三鼓夢此人告以今日雲峯悅禪師來且戒其為待耳大慧謝不敏及回隱靜詢雲峯于老宿有以雲峯語録為示開卷恍然過目誠誦終不忘自時叢林傳大慧為雲峯後身逮圜寂嘗有對靈文略曰舉世知雲峯悅老之後身逢時獲南嶽讓公之前號蓋南嶽讓和尚諡大慧禪師云南禪師居黃檗積翠菴時豫章帥程公闢以詩招住翠巖曰翠巖泉石冠西山欲得高人住此間曾是早年聽法者今生更欲見師顏南和之曰白髮滿頭如雪山尪羸無力出人間翻思有負公侯命旦夕倣徨益厚顏及程歸朝閲二年復除江西漕南以頌寄之曰洪井分飛早二年林間仕路兩相懸近聞北闕明君詔又領江西漕使權列郡望風皆草偃故人高枕得雲眠馬塵未卜趨何日預把音書作信傳程和答曰七字新吟憶舊年此時懷抱極懸懸師今有道居禪首我本何人掌吏權明月每思雲下坐青山一任日高眠庵前弟子知多少來者如燈續續傳程之帥豫章乃治平三年丙午歲奏準明堂赦勘會未有名額院宇例賜之由是豫章管內律院並獲其額今鮮有知程之措意焉然非取重南公之道德豈能外護法門如是勤篤耶潮陽劉方明紹興間帥夔府夜登郡閣見有白光發于地乃使人物色其處即軍營教場中待旦掘數尺間得石大如斗剖而中分瑩潔有圓相劉為之喜作瑞石讚欲刊其上適有鑒禪者過焉因告以何不鐫聖像於圓光中使人瞻仰蓋其光非聖像不能顯發也劉然其言以李伯時所畫觀音大士像模勒是時大慧老師居衡陽因命而為之讚曰非因非緣非自然此石此畫亦復爾是光非攝此身相是相非從是光裏二俱難以意測量大士度生亦如是我作此偈助發揮觀者當淨身口意讚雖收廣録而遺其緣起則不見讚意之大全也豐城淨遜監寺與廬陵道一維那輔相泉南教忠光禪師法席有聲於江湖光乃大慧老師號為禪狀元者遜有淵才雅思談噱有味因天寒歲晚諸友擁爐遜適捫蝨戲爇於爐有調之者曰端獅子尚能為報曉雞作文以祭兄既燒蝨豈可不説法語而升濟乎遜衝口成頌曰蝨子聽我語自今宜記取汝墮於蝨中為貪血肉故天堂不去生來生我裩袴養兒名作蟣其蟣多無數我身亦非堅汝豈能長固當知夢幻軀如電亦如露我今開方便示汝轉身處向此一爐中切莫生驚怖盡此一報身莫復來時路畢竟教伊向甚麼處去烈焰堆中𪹼一聲塵塵剎剎無回互於是諸友譁然稱其賢於端獅子文遠矣遜尋旋鄉示寂於力士岸之超果一過其廬悼以偈曰出處叢林二十春孜孜矻矻道為鄰金牛幾度遭塗炭鼻孔方知搭上唇才藉瞎驢開正眼豈期獅子遽翻身死生既了顯何憾萬古秋空月色新一至梅陽省覲大慧辭往洋嶼侍光之病大慧送以偈曰不忘道義閩中去洋嶼菴中看病僧跳出梅陽煙瘴窟千山萬水一條藤光謝事福唐龜山養病於海上洋嶼也錢塘喻彌陀者早專畫彌陀佛為業楊傑次公賞識其精妙以姓呼之為喻彌陀由是得名有部使者問以能畫彌陀何不參禪答以偈曰平生只解畫彌陀不解參禪可奈何幸有五湖風月在太平何用動干戈尋於西湖七寶山鐫石為佛使水陸往來悉得瞻仰既及百尺而門下侍郎薛公問之曰彼彌勒佛見在天宮為諸天説法於此鑿頑石將奚以為耶亦以偈對曰咄哉頑石頭全憑巧匠修只今彌勒佛莫待下生求年三十五占僧籍名思淨乃於城北僦舍日持鉢乞食期以飯百萬僧不二十寒暑及八百萬郡移妙行院額於其處以旌其勤方臘之亂所至無噍類既犯錢塘淨造其前願以一身代一城之命誠心感動賊鋒為之少戢焉蘇州楓橋溫禪師初參鼓山老禪因隨侍過鴈蕩能仁未至間寺罹回祿一夕而燼溫為幹修造事老禪以偈將其行曰老禪不打鼓山鼓投老來歸鴈蕩山傑閣隆樓渾不見溪邊茅屋兩三間二曰溫禪單打布衫過口硬如鐵説諸方肯為老禪持鉢去信之有麝自然香三曰七百間屋幾時了十萬貫錢何日歸除是腰纏更騎鶴道人方了目前機溫至虎丘有遺白金數百星於僧堂前溫以衲蒙首坐其處伺訪者來果倉皇窘甚問其故不以告但悵然而已溫徐曰呆漢若遺却物就山門具名件交取其人曰果爾敢以三之一資公幹緣溫曰佛謂行丐摧我慢結他緣烏用是哉溫之固窮單打布衫而不苟受施且援先訓以拒可謂知本者歟莫尚書將字少虗家世豫章分寧因於西蜀謁南堂靜禪師咨決心要靜使其向一處提撕適如廁俄聞穢氣急以手掩鼻遂有省即以偈呈靜曰從來姿韻愛風流幾笑時人向外求萬別千差無覔處得來元在鼻尖頭靜答之曰一法才通法法周縱橫妙用更何求青蛇出匣魔軍伏碧眼胡僧笑點頭真州六合縣釋迦院妙應大師伯華者以風鑑之術遊士夫間決禍福壽夭多奇中孫尚書仲益與叔詣內翰兄手牘略曰覿過全州遇妙應攜被從之通夕語謂覿去死尚遠也其信從可見於此而尚書果享壽幾及期華雖蘊異能解篤為杜多之行如張魏公尤深知遇題其肖像曰坦然心地元無物蕭灑容儀自出塵日誦觀音呪一藏不妨功行拯迷津潤之焦山虗席有欲延華為東道主華力辭曰愚不曾參禪何敢妄為許事耶聞者賢其言李參政泰發嘗遺以詩曰要知耳目是真梯壽骨穹隆貫伏犀老去不傳梅嶺信生年似與趙州齊恆沙經論心常轉古佛鉗鎚手自攜二廣山川踏應遍打包同過浙東西華年九十九而逝塔於湘西世之挾術盜名濫踞大剎顧華所為盍少貶焉李覯字泰伯旴江人時稱大儒皇祐二年范文正公以表薦之其略曰臣伏見建昌軍草澤李覯前應制科首被召試有司失之遂退而隱竭力養親不復干祿鄉曲俊異從而師之善講論六經辨博明連釋然見聖人之旨著書立言有孟軻楊雄之風實無愧於天下之士而朝廷未賜采收議者嗟惜可謂遺逸矣臣今取刻本人所業禮論七篇明堂定制圖序一篇平土書三篇易論十三篇共二十四篇編為十卷繕寫上進伏乞聖慈當乙夜之勤一賜御覽則知斯人之才之學非常儒也由是就門除一官復差充太學説書未幾而卒泰伯先嘗著潛書又廣潛書力於排佛嵩明教攜所著輔教論謁之辨明泰伯方留意讀佛書乃悵然曰吾輩議論尚未及一卷般若心經佛道豈易知耶有門下士黃漢傑者以書詰其然泰伯答之略曰民之欲善蓋其天性古之儒者用於世必有以教導之民之耳目鼻口心知百體皆有所主其異端何暇及哉後之儒者用於世則無以教導之民之耳目鼻口心知百體皆無所主舍浮圖何適哉噫心經乃唐太宗詔玄弉法師所譯才五十四句二百六十七字耳該夫大般若經六百卷而理窮根極泰伯所言非其自肯安能爾哉南閩修仰書記紹興間為草堂和尚掌記室於泐潭嘗題淨髮圖體類俳優而用事切當其詞曰垢污蓬首笑志公墮聲聞之鄉特地洗頭嗟菴主入雪峰之彀為當時之遊戲屬後世之品量誰知透石門關別有棄繻手段飲泐潭水總是突霧爪牙更不效從前來兩家直要用頂𩕳上一著鋒鋩才動心手相應一搦一擡誰管藏頭白海頭黑或擒或縱説甚胡鬚赤赤鬚胡曾無犯手傷鋒不用揚眉瞬目一新光彩逈絶廉纖休尋頭上七寶冠好看頂後萬里相一時勝集七日良期不須到佛殿階前彼處無草普請向大智堂裏此間有人逮參大慧老師於衡陽未幾隨侍遷梅陽郡守謝朝議以大慧語僚屬曰朝廷編置所謂長老者但一僧耳兵馬司東偏之隙地從其居止既而僧行日至幾數百指施鍬钁而平基址運竹木而縛屋廬聽其指呼無敢怠者守雖聞其服勤如此亦未知果何人也於是延見一二觀其能為仰適承命乃與從容彌日語論英發榷古商今逢原左右守復徵等伍更有蘊異能者否仰遂告以負大經論者有之博極書史者有之詩詞高妙者有之翰墨飄逸者有之其所以未能明徹則佛祖大事因緣而已是以不憚艱險隨侍而來得依仁政幸莫大焉守且駭異知其徒皆為法忘軀之士自是於大慧日益加敬遣其子純粹求入道捷徑大慧示以法語八篇仰之學富才高於文無所不能既罹瘴毒卒於潮陽光孝疇不為太息也太平州蕪湖吉祥訥禪師初出遊方至廬山東林是時法席雄盛英俊畢集訥製照覺禪師畫像讚而為紹介曰雪眉昂藏犀骨挺峻象王回旋獅子奮迅駕鐵牛機佩毗盧印坐斷爐峰巍巍獨鎮黃金闕下詔不來白蓮社裏清風震照覺見而喜待以異禮訥後參圓通禪師秀公遂為其嗣晚年多依圓通法屬故得訥叔之譽於叢林嘗有偈曰嘯月吟風水石間忘機贏得此心間無端打破空狼藉羞對白雲歸舊山訥有禪餘集載名卿宿衲言論之勝叢林祕其傳也廬山棲賢真教果禪師以南康守攜客遊山客肆其忽慢果遂著示欺客文曰凡人之所愛人者必取其道德之淵奧言行之粹美出一言則千里服膺而不倦立一行則百世景仰而不忘逃名於盛世匿耀於靈府返淳復朴終日如愚雖天地至大不足方其志日月至明不足類其達却崇高莫大之富貴若一毫之輕保光輝非常之事業若千鈞之重厲而修勤而行至其所至聞其所聞徹衆智之源造絶學之域允蹈乎六合之外冥運乎萬機之內酬酢往來若空谷之答響此乃吾之深愛者也若夫騁虗聲被殊服私一位之雄踞百人之上又烏足為驚駭焉客庸詎欺我其無能為而我且不知其所以為者也欺客若此其智小哉果嘗注輔教編洪駒父為後序又題其像曰鶴鳴峰前聲聞于天瀑布之下思如湧泉望之毅然即之溫然雙劒屹立香爐生煙之人也之德也與茲山而俱傳江西宗派中有僧可正平者乃果之徒弟也真淨和尚住寶峰日洪明一祖同在侍寮祖請暫假真淨不許及上巳日呼俱侍行為寶蓮莊主具飯真淨題偈于壁曰元符二年三月三春餅撮餤桐飯兼真淨來看信道者洪明一祖相隨參祖匿笑謂同列曰元來老和尚以我名廁於偈故不給假也洪乃覺範祖即超然超然為仰山東道主而與大慧竹菴心虗量珍布衲亦於上巳之晨遊獺徑橋話寶蓮事未免以後之視今猶今之視昔耳徑山本首座自號無住叟因桐廬陳居士求指示遂有偈曰修禪入定元非佛垢污佯狂不是魔一句脫然如道得桐廬江上逆翻波大慧老師見而為之喜本出世住信之博山以偈寄烏巨行和尚烏巨山頭老大蟲爪牙何啻利如鋒等間坐斷三衢路哮吼一聲天地空及移住鄱陽薦福讚開山伏虎師曰人無人而虎也虎無虎而人也毒惡無所發乎中物我無所形乎外莫知其為人也莫知其為虎也蓋道之所在而已人虎於是乎如如也又平居以頌發明古今因緣凡三十餘解既遷寂則為侍僧所匿今只記其頌華亭船子話曰生涯來往華亭上釣盡煙波獲錦鱗蓑笠既穿船亦破更無一法在江濵龍牙才禪師早服勤於佛鑒法席而局務不辭難名已聞於叢林及遊方迫暮至黃龍適死心在三門問其所從來既稱名則知為舒州太平才莊主矣翌日入室死心問曰會得最初句便會末後句會得末後句便會最初句最初末後拈放一邊百丈野狐話作麼生會才曰入戶已知來見解何須更舉轢中泥死心曰新長老死在上座手裏也才曰語言雖有異至理且無差死心曰如何是無差底事才曰不扣黃龍角焉知頷下珠死心便打是時死心自題其像曰齒缺面黑廣南正賊空腹高心不識文墨才疏為四偈以獻曰齒缺面黑達磨重來人心直指大施門開廣南正賊曾經海陳奪得驪珠受用無盡空腹高心罵佛罵人名傳天下越古超今不識文墨六祖同參雖不踏碓見解一般死心見而喜才既住龍牙開堂於潭府有問多答蘇嚧由是叢林雅呼為才蘇嚧懷玉山宣首座初於筠陽黃檗聞祥和尚夜參舉一葉飄空便見秋法身須透閙啾啾忽有省尋造徑山或有謂大慧老師曰明州宣來探宗旨大慧曰我禪如蚌蛤開則五臟皆露何用探焉宣聞而駭異暨隨侍過衡陽服勤久之嘗頌竹篦話曰背觸太乖張癡禪眼似羊貪他一粒米失却半年糧雪峰慧日禪師聞公於衡陽受懷玉命宣與偕行相與建保社汪聖錫半刺宜春時以疏致宣住南源曰佛法至于慈明卷舒作用極其變化得度者四十有六人既已多矣至其枝分派別披敷演迆愈久愈多又獨能不失其真宣公禪師其五世孫也不由階梯直入妙覺得不自得珍不自珍方且韜光休影唯恐人之保我然其名字羶薌終不可掩今萍鄉南源實慈明所坐道場甘棠勿剪三徑就荒為之子孫當不忍坐視知恩報恩勢不可已以此為請尚其肯來宣擨曰我粥飯僧實不願出人間世矣王舍人洋登山謁之贈以詩曰衲帔騰騰粥飯師無人曾見下山時相逢只道無能解肯作紅樓應制詩宣之大槩於詩疏可見矣建炎三年元日圜悟禪師在雲居嘗曰隱士王梵志頌城外土饅頭豏草在城裏每人喫一箇莫嫌沒滋味而黃魯直謂己且為土饅頭當使誰食之由是東坡為易其後兩句預先著酒澆使教有滋味然王梵志作前頌殊有意思但語差背而東坡革後句終未盡餘興今足成四韻不唯警世亦以自警城外土饅頭豏草在城裏著群哭相送入在土皮裏次第作豏草相送無窮已以茲警世人莫開眼瞌睡圜悟遂手寫以遺一書記乃住萬年號村僧者是也楚安方禪師參道和尚於大別未幾改寺為神霄宮方附商舟過湘南於舟中聞岸人操鄉音厲聲云呌那由是有省即説偈曰沔水江心喚一聲此時方得契平生多年相別重相見千聖同歸一路行後道住文殊方為首衆嘗作三頌曰太徹猶如鐵壁山有誰曾透文殊關金圈栗棘都拈出公驗分明道者難二曰太徹猶如鐵壁山他家曾踏上頭關通身手眼全鋒刃滿口知音吐露難三曰太徹猶如鐵壁山離言離相顯重關當年斷臂規模在三拜才終開口難既出世楚安有頌送僧作丐曰自住楚安窮徹骨搜羅淨盡都無物令僧未免登檀門直須深入蒼龍窟拏取驪龍頷下珠任運卷舒頻出沒歸來呈似住山翁令我安居坐兀兀覺華嚴以其具正眼而居荒僻小剎由是疾世無公議為作小傳讚之略曰其悟處諦當如人善射所發皆中的其應機如鳴珂佩玉徐行於坦途舉止皆可法其偈頌如驅市人以戰不問怯勇舉無遺䇿世以覺為知言也泉州北山之頂有橫石如舟世以舟峰名之大比丘諱慶老字龜年既結茅山麓號舟峰菴主然其蚤以道德文章為泉南緇素歆艷李參政漢老嘗訪之不值有詩略曰慧遠過溪應送陸玉川入寺不逢曦于時大慧菴小溪之上百衲所栖舟峰亦與焉舟峰因謂大慧老師曰和尚竹篦話如民家被科胥産業已籍沒猶要其納大慧曰公只道得一半在若無得納何不投河自縊放身捨命去也舟峰自是於道日臻其奧大慧遷徑山遂與俱行為掌記室詞章華贍殊增叢林光潤舟峰嘗自題記容曰撿點眉毛太通真伏犀插腦見精神霜頾漸茁何妨老褸褐長披却耐貧一壑平生專畏影十方從此倦分身君看逐塊紛無數孰與清源獨角麟紹興癸亥孟秋委順李參政漢老祭之其文曰我初來泉塊然寡儔有謁于門曰老比丘其出詩文鏘然琳璆今洪覺範古湯慧休徐叩所有載籍兼收公才吏用孰與子侔晚遇宗師針芥相投千山不憚一鉢孤遊才高者忌衆言所咻我獨不然既其尤金石不遷萬物波流佛法衰微販相求屈迹府縣僒若抅囚公獨先覺與道為謀再挽不出歸安巖幽我老落莫賴以忘憂有疑斯講有唱斯酬胡為捨我逝去莫留白雲無郛明月無輈去來昨夢起滅浮漚唯餘窣堵揭示千秋孝宗皇帝淳熙十年二月乙丑以御注圓覺經賜徑山傳法僧寶印具表奏謝仍進頌曰古佛與今佛同一廣長舌於無途轍中為物啓途轍撥開千嶂雲放出一天月普令大地人言下悉照徹覺亦無可圓幻亦無可滅只此無亦無紅爐一點雪稽佛與佛字字無異説既經乙夜之覽皇情大悅已而宣對降御問曰莊老何如人印奏云只作得佛門中小乘聲聞人蓋小乘人厭身如桎梏棄智如雜毒化火焚身入無為界正如莊子所謂形固可使如稿木心固可使如死灰也於是稱旨逮印示寂諡曰慧辨禪師云白雲海會守從禪師豐城朱氏子於里中西龍院依德真剃髮神宇靖深頎長貌古舌有異相覆繞鼻端如紅菡萏早同廬山系南禪師參潭之道林祐公南臨順寂顧謂衆曰應首座從藏主久在先師會下深明此道且俾衆咨決焉從即師矣既而絶九江入皖山遁迹于山谷寺出世白雲海會有白雲關頌曰白雲關廣藏法界入聖出凡無罣礙等間把住問來由底事分明却不會又自號竹靈叟有頌曰白雲竹靈叟獰似子湖狗衲子擬思量當頭著一口更欲取腹心聖凡皆倒走住住住乘時脫却娘生褲大慧老師遊方時曾與從法席施編正法眼藏訪尋語録而不得故嘗言之太學上舍生楊麟以紹興丁丑夏詣育王冠帶拜大慧於無異堂垂泣云願從和尚出家語未竟擲下巾帽袖中出剪刀自落其髮大慧亟呼左右執其手問其故乃以實對因攝受之次日升堂示衆曰已著槽廠將錯就錯騎却聖僧不妨快樂龍象蹴踏非驢所作堪笑諸方妄生穿鑿休穿鑿祥麟只有一隻角麟便膜拜曰謝師安名即名祖麟大慧復語以六祖於大庾嶺示明上座不思善惡乃至密語密意盡在汝邊之話使其於日用提撕自是除大慧有問則答其士夫衲子並不與交一詞然麟之儀狀雄偉既毅然自處人亦不得而親踈唐舍人立夫以偈寄大慧曰蚤歲屠龍晚獲麟西風一夜海生塵掀天攪地難尋提阿育山前失却身大慧遷徑山麟亦隨侍於道既有徹證忽爾違和大慧遣了德侍者往問之麟以片紙書偈曰衣冠不御髮齊眉一室翛然自不知薄相等間聊示疾起他菩薩幾多疑尋市香三瓣隨爇而誓曰後世身為男子遇明眼宗師童真入道既爇罷泊然而化大慧為秉炬曰擔却一片睦州版一去萬牛不可挽祖師門下真祥麟堪作人天正法眼無何時節忽到來援毫寫偈自催趲楊道者休催趲火裏蝍蟟吞鐵剗麟家世建陽乃文公裔浮山圓鑒遠禪師天聖中許公式漕淮南命出世太平興國寺逮慶曆癸未逸居天柱山月華庵至丙戌歲呂翰林濟叔以浮山延致皇祐辛卯謝事而菴于寺西癸巳歲應姑蘇天平之招至和中復旋浮山舊隱然三住持並革故創新為禪林於治平丁未年七十有七以仲春六日有遺語曰法遠以一幻身旅泊三界雖職導利實無一法與人深慚誑世實愧虗稱茲乃形質朽敗四大將離聚沫之軀有何久計既當風燭何歎逝川又念幻身在世仁信多有供須耻無道業升消曷有勝緣報答忖量唯己自知湛寂真元却還本道忍死半刻援筆陳謝觀其詞雜而理到可見為臨行親筆矣至於謙損亦足警誡吾徒耳又頌曰幻世出沒有何窮幻化本來體自空南山起雲北山雨樓頭鼓動慶陽鐘又曰來時無物去亦無譬似浮雲布太虗拋下一條皮袋骨還如霜雪入洪爐又自歎曰孤舟夜靜泛波瀾兩岸蘆華對月圓金鱗自入深潭去空使漁翁執釣竿師之嗣法雲者繼席浮山録師行實劖于石世姓沈年十七占僧籍及僧寶傳所收以沈為王以十七為十九慶曆皇祐間師之道大顯著接投子青續洞上宗派指老東山參白雲端於宗門可謂有功矣出處差紊其可乎寂音尊者崇寧元年夏於長沙雲蓋是時陳公瓘瑩中謫嶺外以偈見寄且欲其為負華嚴經入嶺偈曰大士遊方興盡回家山風月絶讖埃杖頭多少間田地挑取華嚴入嶺來寂音和之曰因法相逢一笑開俯看人世過飛埃湖湘嶺外休分別圜寂光中共往來其後寂音坐與公遊而獲譴靖康元年嘗詣刑部陳詞曰放停僧慧洪見年五十六歲本貫筠州人元係右街香積院僧籍先因崇寧初諫官陳瓘論列蔡京事忤旨編管連州慧洪為見陳瓘當官盡節投竄嶺海一身萬里恐致踈虞調護前去往來海上前後四年因與陳瓘厚善又緣得度為僧元係故宰相張商英奏名政和元年商英奏取陳瓘所撰尊堯録是時內官梁師成與蔡交結見宰相薦引蔡京仇人陳瓘百計擠陷旬月之間果遭斥逐猜疑是慧洪與陳瓘為地發怒諷諭開封尹李孝壽勾慧洪下獄非理考鞠特配吉陽軍後來因患不堪執役蒙恩放令逐便經今一十四年近聞朝廷追贈張商英陳瓘官爵旌其忠節流竄蔡京梁師成嶺外正其罪惡顯見慧洪前頃所坐情節委實冤枉慧洪切見紹聖間杭州僧道潛緣與蘇軾內翰相善仇家呂升卿任浙西使者收捉道潛付蘇州獄枉法編管兗州後來經朝廷雪理改正為僧近見右街僧永道宣和初因改德士上書爭救開封尹盛章收捉決配道州去年內亦蒙改正訖切念慧洪別無犯由只緣開封官吏觀望內臣權勢遂將慧洪枉法行遣與道潛永道冤枉情理前後比類相同今來具狀告投判部尚書欲乞依道潛永道例別賜改正為僧未敢專擅伏聽台旨是時朝廷事屬多故未果舉行而明年夏寂音委順於同安韓舍人子蒼為銘其塔謂其友賢招怨真知言矣
