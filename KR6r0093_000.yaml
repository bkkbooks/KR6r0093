front:
  text: 感山雲臥紀談始予出自南閩遠歸江表分甘與艸木俱腐誅茅城山以尚書孫公仲益所書雲臥菴字而揭焉公又以詩見寄有身世兩相違雲閒臥不飛之句葢其知予者也山頂高寒非老者所宜八見青黃病隨日生繇是徙居曲江之感山年運既往與世日益疎闊順時制宜以待溢然或逃可畏之暑於松塢或暴可愛之日於茆簷身閒無事遇賓朋過訪無可藉口則以疇昔所見所聞公卿宿衲遺言逸跡舉而資乎物外談笑之樂不謂二三子剽聞而耳亦熟矣遂相與記諸以雲臥紀談名之然予所談未必世之贒者以為善令會稡成編無乃重予之過歟若夫文字性空言語道斷以予終日談為未甞談則庶幾焉雲臥菴老僧自敘雲臥紀譚目錄卷上富弼頌書秀紫芝文東山吉仁宗問大覺黃龍頌三關周茂叔青松社禪公頌古齊己粥疏查道僧堂記佛心才無盡送羽士明大禪持鉢修演入定鼓山刊錄回石頭錄敘道潛參寥子自雲厨堂記大慧寓韓駒齋慈雲陳詞羅漢系南飯僧嚫金泉入黃龍室雪竇持龍牙從密英鐵觜西湖清淳汪藻會諸山嚴陽尊者大慧雲峰後身程闢招老南劉公觀音石像淨遜燒虱法語喻彌陀溫公修造莫將謁南堂妙應風鑑李覯恭伯脩仰書記訥叔至東林果公示欺客真淨行寶蓮徑山本首座才蘇嚕宣首座圓悟書王梵志頌楚安方舟峰慶老御註圓覺經海會守從楊麟出家圓鑑遠公寂音獲譴卷下尼慧光說法孝宗原道辨隆慶閑泉大道頌大悲閑長老佛印謁王荊公老華嚴出世無際掃塔惟正禪師南老答鄒長者嚴朝康頌古文殊道饒節從釋氏且公頌古蘇軾讚泗州信園頭能詩皓布裩塔銘尼真如參道保寧璣道者馮氏讚大慧岳林寺重建簡上座尊宿漁歌大慧再訪無盡謙問張浚端故事辯麤大覺乞歸山蘇轍謁佛印雪堂行達磨讚蘇轍左遷陳堯佐誌墓報本元嗣書野軒詩頌徐禧問靈源無盡徵詰永道抗辯伊蒲塞達觀性辯蘇軾衲衣無著道閑佛慧北邙行政書記詩卷末雲臥長書雲臥紀譚目錄終
