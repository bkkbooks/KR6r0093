body:
  text: 東都妙慧尼寺住持淨智大師慧光出於成都范氏其著書號唐鑑乃其叔父也徽廟時禁中以法衣施諸禪長老光亦與焉因命資次説法而光受當其末升座問答罷顧視大衆曰若論説禪説道則諸大禪師已説了也教山僧到這裏説箇甚麼即得豈不見先德道千種言萬般解只要教君長不昧既然如是畢竟如何光遂以法衣覆頂良久云衲帔蒙頭萬事休此時山僧都不會便下座于日緇素聽者萬計靡不歎服所以韓舍人子蒼銘光之塔稱其多聞善辨焉塔創於豫章西山聖相之原幸宗皇帝御重華宮時製原道辨曰朕觀韓愈原道因言佛老之相混三教之相絀未有能辨之者且文繁而理迃揆聖人之用心則未昭然矣何則釋氏專窮姓命棄外形骸不著名相而於世事自不相關又何與禮樂仁義哉然尚立戒曰不殺不淫不盜不飲酒不妄語夫不殺仁也不淫禮也不盜義也不飲酒知也不妄語信也如此於仲尼夫何遠乎夫子從容中道聖人也聖人所為孰非禮樂孰非仁義又烏得而名焉譬如天地運行陰陽循環之無端豈有意春夏秋冬之別哉此聖人強名之耳亦猶禮樂仁義之別聖人所以設教治世不得不然也因其強名揆而求之則道也道也者仁義禮樂之宗也仁義禮樂固道之用也彼揚雄謂老氏槌仁義滅禮樂今迹老子之書其所寶者三曰慈曰儉曰不敢為天下先孔子曰溫良恭儉讓又曰唯仁為大老子之所謂慈豈非仁之大者耶曰不敢為天下先豈非遜之大者耶至其會道則互相偏舉所貴者清淨寧一而於孔聖果相背馳乎蓋三教末流昧者執之自為異耳夫佛老絶念無為修心身而已矣孔子教以治天下者特所施不同耳譬猶耒耜而織機杼而耕後世徒紛紛而惑固失其理或曰當如之何去其惑哉曰以佛修心以老治身以儒治世斯可也唯聖人為能同之不可不論也間禪師者熙寧中廬陵太守張公鑒命出世隆慶未期月王公韶帥豫章延居西山龍泉不逾年以病謝事廬陵緇素具舟迎歸隆慶館于西堂閲二寒暑以元豐四年三月十三日遺偈曰露質浮世奄質浮滅五十三歲六七八月南嶽天台松風澗雪珍重知音紅爐優鉢遂泊然坐逝俾畫工就寫其真首忽自舉次日仍舊平視其語録才數端刊于泉南有室中垂問曰祖師心印篆作何文諸佛本源深之多小又曰十二時中上來下去開單展鉢此是五蘊敗壞之身那箇是清淨法身又曰不用指東畫西實地上道將一句來又曰十二時中著衣喫飯承甚麼人恩力又曰魚行水濁鳥飛毛落亮座主一入西山為甚麼杳無消息間之闍維奇瑞詳於蘇黃門子由之記故茲略録遺偈垂語庶不殞其實云南嶽芭蕉菴主世呼為泉大道以其歌頌間有大道為題如六巴鼻頌曰大道巴鼻問著瞌睡背負葫蘆狂歌逸戲散聖巴鼻逢場作戲東湧西沒南州北里禪師巴鼻有利無利碧嶽崔嵬龍行虎視衲僧巴鼻坐具尺二休尋短長風高雲起座主巴鼻懸河無滯地湧金蓮手擎如意山童巴鼻金將火試客問山居遠來不易一日斐然成狂歌曰阿呵呵憶著我前年在青州喫箇棗如今立地忽思量獨笑獨歌任得倒張顛李八伯黃婆鄭九嫂心草草牀頭失却大貓兒走下門前捉蛤蚾休更討南山雲引北山雲歸去來兮一二三四五六七八九朵其言雖似放旨則有歸既自以為適亦足照映叢林矣福州閩縣般若精舍紹興甲寅歲有西堂乃洞江大悲間長老時年八十有四大慧老師居洋嶼與般若一水之隔間雖老而尤篤參究日來隨衆入室大慧因問曰不與萬法為侶是甚麼人間曰扶不起大慧曰扶不起底是甚麼人速道速道間擬對大慧以竹篦便打間忽契悟大慧説偈印之曰一棒打破生死窟當時凡聖絶行蹤返笑趙州心不歇老來猶自走西東而閩中有嘲之以偈曰八十老翁間灌頂只説如今行路難海門洋嶼煙波裏依舊漁翁把釣竿大慧演為四偈曰八十老翁間灌頂鵝王擇乳自家知寄語叢林瞎漆桶莫將鶴唳作鶯啼只説如今行路難前三三與後三三寄語叢林瞎漆桶雲頭放下更來參海門洋嶼煙波裏得到其中有幾人寄語叢林瞎漆桶不須背後起貪瞋依舊漁翁把釣竿錦鱗蝦蟹不顢頇寄語叢林瞎漆桶休將生滅話頭看佛印禪師元豐五年九月自廬山歸宗赴金山之命維舟秦準謁王荊公於定林公以雙林傅大士像需讚佛印掇筆書曰道冠儒履佛袈裟和會三家作一家忘却率陀天上路雙林癡坐待龍華公雖為佛印所調而終服其詞理至到故小行書彌勒發願偈數百字為酬山谷為跋佛印既住雲居而刊于石尚復存焉魏府老華嚴者諱懷洞五季時初弘華嚴之教晚參興化存獎禪師得教外別傳之旨遂出世天鉢次徙壓沙禪苑河朔緇素尊事之故稱老華嚴禪門宗派圖有天鉢和尚系出興化者是也洞嘗有示衆語曰佛法在儞日用處在儞行住坐臥處喫茶喫飯處語言相問處所作所為處若舉心動念又却不是也還會麼儞若會得即是擔枷帶鎖重罪之人何故如此佛法不遠隔塵沙劫一念中見得在儞眉毛鼻孔上儞若見不得如接竹點月相似無有是處儞究竟麼切莫思惟不可言論時中承何恩力儞若知得須有歡喜處所以古人道寂寂常歷歷諸佛不求覔衆生斷消息儞還會麼一切諸佛本無情一切諸佛本無名一切衆生本自靈混然如太虗空無欠無餘儞若不會直得觸途成滯今林間録以此為天鉢元公語又元為老華嚴則誤矣元嗣天衣懷乃雲門五世孫洞以大父事臨濟其説法旨趣端可驗矣無際道人乃張侍郎淵道之女超宗道人乃劉侍郎季高猶子之母其於大慧老師之門俱受記莂者無際嘗詣徑山掃塔有頌曰衣濕靈山淚爐焚少室香雲山空滿目不見法中王時超宗不至無際督之超宗以偈答曰塔本無塵何用去掃掃即塵生所以不到初無際居家日有相者過之曰此寶座説法之人也後果為尼名慧照晚繼其落髮師資壽無著之法席嘗以漁家傲讚圜悟禪師曰七坐道場三奉詔空花水月何時了小玉聲中曾悟道真堪笑從來謾得兒孫好辨湧海潮聲浩浩明如皓月當空照飛錫西歸雲杳渺巴猿嘯大家唱起還鄉調乾道七年遷住臨平明因淳熙四年六月於無為軍忽別其子梁簽判徑往光孝坐繩牀而逝及剃髮舍利無數時當伏暑留數日室貌儼然住資壽小師覺真迎歸姑蘇暫菆楞伽山閲十一秋其子遷還三衢龕才出穴而泉亦隨湧緇白駭敬非般若之驗歟惟正禪師秀之華亭黃氏子甫五歲見佛書能指識其字才誘讀則琅然成誦逮冠入杭之北山資聖師事本如郡人朱紹安欲啓帑金為補僧籍掉頭不諾乃悵然曰古之度人以清機密旨今殊不然正以捨去老幼童其顛褐其身而已奈何真不勝偽滔滔皆是耶居無何霑祥符覃渥獨擁毳袍且弊同列慢之正曰佛乎佛乎儀相云乎哉僧乎僧乎盛服云乎哉厥後有願輸奉歲時用度俾繼如之院務亦復謝曰聞托鉢乞食未聞安坐以享聞歷謁諸祖未聞廢學自任況我齒茂氣完正在筋力為禮非從事屋廬之秋也於是提䇿東引學三觀於天台復旋徑山咨單傳之旨於老宿居素尋參侍素董臨安功臣山淨土院戮力為集百事天禧中素示寂正從僉議嗣其席正雅富於學作詩有陶謝趣臨羲獻書益尚簡淳至於吐論卓犖推為辨博之雄如王文康胥內翰吳宣獻蔡密學皆樂與為方外遊然平居識慮灑然不牽世纍處己清尚於詩尤可見矣溪行絶句曰小溪一曲一詩成吸盡詩源句愈清行到上流聊憩寂雲披煙斷月初明皇祐元年孟夏八日語衆曰夫動以對靜未始有極吾一動歷年六十有四今靜矣然動靜本何有哉於是泊然而逝南和尚居黃檗時答鄒長者偈五章曰短序長書皆典雅五言七字更工夫若能言行長相顧萬古新昌君子儒二曰日往月來如擲梭年顏不覺暗消磨勸君早踐菩提路世諦嘍囉不用多三曰時人心地長蒿蕪受報因茲錯道塗舉世不論僧洎俗要須言行與相符四曰久聞齋素好持經欽羡蓮華火裏生浮世勞勞皆夢幻叮嚀只此是前程五曰僕者言歸不暫居聊成數偈答君書煙霞幸得為鄰並從此相知德不孤南禪師以伽陀復寒溫之問如此可謂造次不忘於誘道矣饒州教授嚴公朝康問道於薦福雪堂報恩應菴嘗有頌曰趙州狗子無佛性我道狗子佛性有驀然言下自知歸從茲不信趙州口著精神自抖擻隨人背後無好手騎牛覔牛笑殺人如今始覺從前謬時大慧老師在梅陽嚴以其頌寄呈而大慧答以書略曰隨人背後無好手此八萬四千皆公活路嚴乃湖州長興人也鼎州文殊道禪師初遊成都講肆究唯識論幾十稔有詰之者曰三界唯心萬法唯識今目前森然心識安在道茫然不知對乃出峽周流江淮既氐舒之太平聞佛鑑禪師夜參舉趙州庭前柏樹話至覺公言先師無此語處而大疑提撕既久一夕豁然以頌發揮之曰趙州有箇柏樹話禪客相傳遍天下多是摘葉與尋枝不能直自根源會覺公説道無此語正是惡言當面罵禪人若具通方眼好向斯中辨真假及佛鑑示寂於鍾山為舉哀拈香曰悲想今年十月八鍾阜先師示寂滅石女號咷恨離別木人眼裏淚流血師資之道情何切一度追思一哽咽唯憑一炷紫檀香珍重當年説不説道享年七十有二於建炎己酉上巳日為湖南巨寇鍾相者所害典牛菴主遊公以偈悼之曰苦竹穿心透脊滿路生血滴滴大龍澗水山花何似白乳三尺刀鏘林裏休休報德酬恩已畢他時後日相逢飯臺更與一躍倚松菴主乃臨川饒節字德操者政和間裂儒衣從釋氏名如璧無何朝廷建議以僧為德士使加冠巾德操有頌曰德士舊來稱進士黃冠初不異儒冠種種是名名是假世人誰不被名謾又嘗次韻答呂居仁曰向來浪説濟時功大似頻伽餉遠空我已定交木上座君猶求舊管城公文章不療百年老世事能排兩頰紅好貸夜窗三十刻胡牀趺坐究幡風其山居頌曰禪堂茶散卷殘經竹杖芒鞋信腳行山盡路回人迹絶竹雞時作兩三聲石楠子熟雪微乾曾向人家畫裏看覿面似君君未領問君何處有遮闌幾被儒冠誤此身偶然隨分作間人二時齋粥隨緣飽長短高低一任君律師持律笑禪虗禪客參禪笑律拘禪律二途俱不學幾箇男兒是丈夫陳瑩中有偈寄之曰舊知饒措大今日璧頭陀為問安心法禪儒較幾何大溈佛性禪師為其嗣者潭州慧通旦公嘗頌覺鐵觜先師無此語話曰誰道先師無此語焦尾大蟲元是虎胡蜂不戀舊時窠猛將不歸家裏死急著眼勿回顧若會截流那下行匝地清風隨步武佛性見而諭之曰頌古拈古要奢儉得所如人解使錢不必多也及頌黃檗示衆噇酒糟話曰荊棘林中宣妙義蒺䔧園裏放毫光千言萬語無人會又逐流鶯過短牆佛性頷之大慧老師嬰難居衡陽旦寄以偈曰出岫孤雲豈繫懷致令猿鶴有餘哀吾皇詎肯忘吾道不日恩光動地來二曰佛祖嫌來不肯做却言無位可安排笑他用力區區者剛把虗空取次埋三曰異類中行世莫猜故教佛日暫雲霾度生悲願曾無間却作南安再出來公諱清旦字明及蓬州人也蘇文忠公以紹聖甲戌夏為潮州麻田吳子野讚泗州像曰盲人有眼不自知忽然見日喜而舞非謂日月有存亡實自慶我眼根在泗州大士誰不見而有熟視不見者彼豈無眼業障故以知見者皆希有若能便作希有見從此成佛如翻掌傳摹世間千萬億皆自大士法身出麻田供養東坡讚見者無數悉成佛公既安置惠州於丁丑歲被命責儋耳專守方子容自攜告身而弔之曰此皆前定無可恨者吾室沈氏事泗州甚謹一夕夢泗州告別問何所往答以當與蘇子瞻同往在七十二日之後也今日如其數豈非前定乎蘇曰事孰非前定者不待夢知矣然余何人辱與泗州和尚同行得非夙世有緣契乎參寥子嘗有偈為紀之曰臨淮大士本無私應物長於險處施親護舟航渡南海知公盛德未全衰南昌信無言者早以詩鳴於叢林徐公師川洪公玉父品第其詩韻致高古出廋權癩可一頭地由是收名定價於二公及參大慧老師於泉南小溪俱康南二道者事蔬供衆因钁地次南曰钁頭邊道將一句來信擎起钁頭康以土塊擲中柄上信忽有省故嘗有詩曰新菴小溪上英俊頗浩浩從渠作佛祖任渠會禪道荷鋤向東園事蔬誓畢老乘月始抱甕破午正殺草芥藍被蟲食秋茄亦旱稿齋盂從此去但願蔓菁好士大夫遊小溪喜言詩者大慧必曰此間有箇園頭能詩然信之議論尤高聆其緒餘者莫不屈服自是隨侍之徑山過衡陽尋放浪於衡嶽棲遲道吾為最久削木以蔽風雨于院之西偏榜以版菴禪燕自牧于湖居士張公帥潭聞其高風力致出世湘西鹿苑贈之以詩曰詩卷隨身四十年忙中參得竹篦禪而今投老湖西寺臥看湘江水拍天句中有眼悟方知悟處還應痛著錐一箇身心無兩用鳥窠拈起布毛吹信和之今記其一曰竹篦子話選當年直下無私不是禪既遇狀元真眼目敢拈沈水向人天平時製作名為南昌園夫集胡侍郎明仲易之曰奇葩以序冠集首云無盡居士張公為玉泉皓禪師撰塔紀其入厨見饌晚膳問待過客耶為衆僧耶既以實對即呼知事杖而數之曰吾昔參禪為人汲水舂米今現成米焏炊造作與供養諸佛菩薩無異飽喫了並不留心參學百般想念五味馨香假作驢腸鱓生羊骨鱉餵飼八萬四千戶蟲開眼隨境攝闔眼隨夢轉不知注祿判官掠剩大夫隨汝抄劄消鑿祿簿教汝受苦有日在徒衆不堪其枯寂譖於縣宰曰長老不能安衆唯上來下去點撿零碎縣宰召皓至語之曰大善知識何不在丈室端坐兩廊下三門前來去得許多耶皓曰大通智勝佛十劫坐道場長官以坐是佛耶坐殺佛去也縣宰笑而已噫皓布裩平居凡聖莫測而無盡公欲其傳世得非借古以警今耶關西除饉女名真如者早進入官以才能選為內夫人隸喬貴妃閣喬氏崇佛容其剪䰂參道四方既入閩與大慧老師泉南小溪雲門法會一日作偈曰平地偶然著攧起來都無可説若人更問如何笑指清風明月大慧為小參對衆説偈曰今日如師姑昔時王師父身居羅綺叢只著粗麻布開口便高談嫌佛不肯做跳出是非坑截斷生死路入虎穴魔宮心中無怕怖杜撰八陽經自有三千部愛吟落韻詩偏不勒字數行腳走天下參禪無所悟近日到雲門一時都敗露錯認碓觜頭喚作冬瓜瓠如此作師姑勸君少喫醋更有一處乖且道那一處嘉州大像喫炙麩陝府鐵牛撑破肚如之施為可槩見矣保寧璣道者天資精勤談噱有味大慧老師謂其為惺惺道者江東漕使以威臨諸禪因以過水羅漢畫像與璣觀玩而指其作老態過不得者問曰保寧莫過得否對曰合眼便過得漕使為之解顏已而諸禪畢集於保寧寶公菴有設問曰既是寶公菴為甚麼無寶公然須次第下轉語以為勝集之樂璣曰從年臘下而上蓋在座唯璣為年臘長也及至於璣有曰當老和尚下語矣璣遽離坐顧諸禪曰請去方丈裏喫茶聞者莫不大噱璣見僧來必問近離何許夏在甚處待其祇對畢却問人人有箇生緣作麼生是上座生緣于時寂音嘗請益於璣曰和尚與兄弟相見何不便問生緣璣曰且要伊開得口其存誠及物又如此馮公濟川紹興戊午坐夏徑山有宣城廣心上座以大慧老師畫像請馮讚之曰要識徑山長老強項更無倫匹安却百千大衆常住元無顆粒若論説道説禪果是縱橫難敵一味性氣不常佛也理會不得隔江一見便回敢保上上大吉大慧見而題其後曰妙喜妙喜濟川讚儞廣心會麼隘是隘是蓋宣城鄉諺有路上行人隘是耶之句又濟川適中風而口喎斜大慧以偈問候曰未解野犴鳴先作獅子吼只因謗般若喎却一邊口觀其道術相忘未易以常情測度耳明州奉化縣嶽林寺乃布袋和尚道場崇寧間董氏造閣而任氏塑布袋像奉安其上後董氏不平移下其像而自塑焉尋有善數術者云董氏所捨者只得六十年運任氏始發耳紹興末閣經回祿像俱為灰燼逆其數如所謂也于時饒道者然一臂募緣重建閣以任氏之像居中禱祈必應主僧瑩禪師字溫叟以三偈遺饒曰忘身一臂等間然勇猛頭陀了勝緣閙市門前打得著始知無手解行拳二曰汝將粉骨報誰恩稽首龍華補處尊無指可彈猶省力重重樓閣自開門三曰我亦將頭入閙藍且圖香火有同龕布囊貯滿一落索巷尾街頭學放憨其號布袋者以其杖荷布囊而供身之具盡貯於中自稱名契此示寂於五季之梁貞明二年丙子歲也徽州簡上座者徑山顏首座因問之曰一二三四五六七明眼衲僧數不足儞試數看簡便喝顏復曰七六五四三二一儞又作麼生簡擬對顏便打出即曰儞且莫亂道簡於言下有省遽説偈曰儞且莫亂道皮毛卓竪寒只知梅子熟不覺鼻頭酸嘗頌狗子無佛性話曰趙州老漢渾無面目言下乖宗神號鬼哭先是大慧老師揭榜於佛殿不許憑欄干簡既犯所戒遭刪去未幾而卒年未三十交朋靡不傷悼之海昏逸人號日涉園夫者李彭商老參道於寶峰湛堂遇山舒水緩必拉大慧老師為禪悅之樂故嘗有語曰日涉園夫與杲上人同泛煙艇遡修江而上遊炭婦港諸野寺杲擊棹歌漁父聲韻清越令人意界蕭然因語園夫曰子其為我作頌尊宿漁父歌之自汾陽已下戲成十首付杲上人談笑而就故不復竄也一汾陽曰南院嫡孫唯此箇西河獅子當門坐絹扇清涼隨手簸君知麼無端喫棒休尋過二慈明曰掌握千差都照破石霜這漢難關鎖水出高源酬佛陀哩稜邏須彌作舞虗空和三雲峰曰孤硬雲峰無計較大愚灘上曾垂釣佛法何曾愁爛了桶箍𪹼通身汗出呵呵笑四老南曰萬古黃龍真夭矯斬新勘破臺山媼佛手驢蹄人不曉無關竅胡家一曲非凡調五晦堂曰寶覺禪河波浩浩五湖衲子來求寶忽豎拳頭宜速道茫然討難逃背觸君須到六真淨曰貶剝諸方真淨老頂門眼正形枯稿一點深藏人莫造由來妙光明烜赫機鋒峭七潛菴曰積翠十年丹鳳穴當時親得黃龍鉢掣電之機難把撮真奇絶分明水底天邊月八死心曰罵佛罵人新孟八是非窟裏和身拶不惜眉毛言便發門庭滑紅爐大鞴能生殺九靈源曰絶唱靈源求和寡失牛尋得西家馬顧陸筆端難擬畫千林謝吟風擺雪真蕭灑十湛堂曰選佛堂中川藞苴衲僧鼻孔頭垂下獨秀握來無一把杖頭挂從教四海禪徒訝丞相張公天覺眼明機峻慧辨難敵宣和二年春大慧老師再訪之于荊南一日公問佛具正遍知亦有漏網處師曰何謂也公曰吾儒尚云西方有大聖人不治而不亂不言而自化然堯舜禹湯皆聖人也佛竟不言之何耶師曰堯舜禹湯比梵王帝釋有優劣否公曰堯舜禹湯豈可比梵王帝釋哉師曰佛以梵釋為凡夫餘可知矣公曰何以知之師曰吾教備言佛出則梵王前引帝釋後隨公乃擊節以為高論後紹興九年秋尹侍講訪師于徑山夜話及此尹亦首肯再三大慧老師先住徑山日遣謙首座往零陵問訊張魏公是時竹原菴主宗元者與謙有維桑契分元於道先有所證謙因慨然謂元曰一生參禪見知識不得了當而今只管奔波如何則是元笑而語之曰不可路上行便參禪不得也儞但平日參得底悟得底及長靈圜悟佛日三老為儞説底都不須理會我今偕行途中可替底都替儞了其替不得有五件事儞自管取謙曰何謂五事元曰著衣喫飯屙屎送尿駝箇死尸路上行謙未逮半途忽有契悟元賀曰今日且喜大事了當我已見清河公竟兄當獨往宗元從此歸鄉矣魏公嘗為謙識其悟為名菴曰自信而記之略曰余氐湖湘佛日又使謙來發武林越衡陽崎嶇三千餘里曾不憚煩中途緣契悟徹真理一見神色怡然若礙膺之疾已除者仍以筆誥寄元曰余謫居零陵徑山佛日禪師遣謙師上人來問動止僧宗元因佛日室中舉竹篦話心地先有發明處毅然與謙偕來既至撫信問謙亦因緣契會放下從前參學窠窟元喜曰我已見清河公矣徑歸東陽為衆辦衆事余嘉其行止近道書此寄元因勉以護持云紹興戊午四月二十三日紫巖居士張浚德遠書及謙回大慧逆自半山望見便曰這漢和骨都換了謙後歸建陽結茅于仙洲山聞其風者悅而歸之如曾侍郎天遊呂舍人居仁劉寶學彥修朱提刑元晦以書牘問道時至山中有答元晦其略曰十二時中有事時隨事應變無事時便回頭向這一念子上提撕狗子還有佛性也無趙州云無將這話頭只管提撕不要思量不要穿鑿不要生知見不要強承當如合眼跳黃河莫問跳得過跳不過盡十二分氣力打一跳若真箇跳得這一跳便百了千當也若跳未過但管跳莫論得失莫顧危亡勇猛向前更休擬議若遲疑動念便沒交涉也謙有出山相讚曰蘆膝鵲巢成底事蓬頭垢面出山來若言悟道今成佛當甚街頭破草鞋又頌即心是佛曰誰家飯挂空梁指與小兒令看解開見是灰囊當下命根便斷又衡陽道中示同行曰月照天心古館明衡陽春色為誰青不知雪擁鼇山後慶快平生有幾人大慧先住徑山語要乃謙有衡陽編次謙嘗從劉寶學所請出世建之開善南海僧守端字介然為人高簡持律嚴甚於書史無不博究商榷古今動有典據叢林目為端故事亦喜工詩務以雅實其題石盆菴曰菴額初頒挂樹頭樹摧菴朽幾經修石盆不減數升水野菜時添一筯油童子面承天子問老師心與祖師儔我來蹭蹬思高躅萬壑雲橫楚甸秋嘗栖養於佛手嵒洪諫議是時監太平觀施以米有疏曰太平散吏洪芻謹月捨俸米入佛手嵒供介然禪師惟佛手嵒不二之臺真廬山間第一之境自因公之既往何作者之無聞恭惟禪師杖錫來儀解包戾止影不出山久矣脅不至席有焉居士聞風而悅之俗子望崖而退耳室有生塵之甑爨無欲清之人初無半菽之糧孰置五斗之飯芻今者食供日中之一月輸斗米之三厥數雖減於淵明但索猶賢於方朔定有諸天之辦供豈無野鹿之銜花折腳鐺中拾枯松而煮瀑布掉頭吟處破明月而抹清風丈室雖受於一牀繞腹豈須於三篾蓋自是臺無餽也孰謂繼粟之徒歟旋豫授子之粲兮請嗣緇衣之好耳嵒在廬山之北李氏有國日行因師居焉蘇州辨禪師初參穹窿圓公有所省發既入京與天寧圜悟法席愈臻奧閫因大慧老師頌船子接夾山話曰驀口一橈除作解從茲夾嶺氣衝天離鈎三寸無消息獨向滄溟泛鐵船辨屬其韻曰合頭著語酬船子恰似堀地覔青天直饒楫下通明徹也是華亭破漏船辨之為人疏放叢林目為辨粗嘗有四威儀頌曰山中行穿林野鳥亂縱橫往往山僧殺心重猿猱驚得墮深坑山中住密室儼然念無數可憐窮鬼出家兒覔得鹽來又無醋山中坐疊足跏趺似推磨草鞋踏破幾千雙惹得通身都是過山中臥榾䂐枕頭豁然破突出金剛正眼睛宇宙知音無一箇其後出世未嘗開堂而終大覺禪師以治平三年上表辭英廟乞歸山曰臣聞大道無為萬物備求其應聖人在宥百姓各遂其生矧當熙洽之辰得豫便安之理仰蘄俞允俯集凌兢臣懷璉中謝伏念臣爰自頃年誤知先帝忝紹隆於祖席尤霑被於宸庥久歷歲華未忘山藪屢嘗引退靡獲報音膺陛下纂服之秋屬海內嚮風之旦願宣佛事上答堯仁奈以暮齡益衰夙疾增劇昨捐衆務權止寺居伏蒙皇帝陛下特遣使華送回本院仍傳聖諭且駐神京自惟無用之軀實出非常之遇是天地有再生之德而草萊謝重茂之心伏望聖慈垂雨露之恩均日月之照俯從人欲下徇愚衷庶令朽鈍之姿得遂林泉之志然而微蟲得計誠無易水之情疲馬增鳴但起戀軒之思誓勤焚誦式報生成將遠宸庭無任瞻天望聖激切屏營之至謹奉表奏辭以聞大覺既渡江少留金山而氐西湖四明郡守以育王虗席迎致是時奉化九峰韶公作緇素勸請疏曰鄮嶺特秀佛祠頗嚴煙雲蔽虧金碧煥爛勝絶若此宜待乎誰不然皓月流空遇暗即破至人應世隨方即居豈以小奇汩彼大度欽惟禪師道協主上名落天下倫輩顯赫何莫由斯當念東南以來吾宗頽圮縱有扶救之者如操朽索御彼奔輪漸使異徒坐觀傾覆禪師聞此當如之何良謂道高位崇理不可免瀝誠露膽言不敢文衆等但加歸投遐聽其足音耳大覺閲罷憫其詳切欣然允從自是叢林靡不謂大覺為九峰一疏而來究其所自豈不然耶佛印禪師平居與東坡昆仲過從必以詩頌為禪悅之樂住金山時蘇黃門子由欲謁之而先寄以頌曰粗砂施佛佛欣受怪石供僧僧不嫌空手遠來還要否更無一物可增添佛印即酬以偈云空手持來放下難三賢十聖聚頭看此般供養能歆享木馬泥牛亦喜歡然黃門佛印以斯道為際見之歡視老杜贊公來往風流則有間矣雪堂行禪師稟性和易不倦隨機開導住括蒼乾明時有僧問曰宗門中事望師直指對曰門前石塔子僧不契久而復請益因以偈示之曰門前石塔子八白仍九紫方位已分明莫被巡官使尋有優婆塞問曰一切事臨身處置不下時如何行曰此不能轉物正是我家禪和子用工夫處豈不見觀音經云呪咀諸毒藥所欲害身者念彼觀音力還著於本人只這本人兩字極是難會若非透向上關棙者不識所以法眼和尚頌曰呪咀毒藥形身之逆眼耳若通本人何適雲峰悅禪師為芝禪師充維那於豫章翠巖時命蜀僧繪達磨祖師像龕于堂司歲月既久塵蒙蛛絲有贛上比丘慧空出力妝治之由是神明還舊觀生氣凜然紹興戊午南城童藻之敏德嘗為讚曰昔從西天鼎來東土為佛法心印未傳面壁而坐九伏臘一華既開隻履乃歸道已洽道如廣廈有梁有棟不傾厭今覩遺像龍章鳳姿離塵雜巍巍堂堂猶想無語踞禪榻去古滋遠異端橫流少檢狎九原可作吾欲起公主盟歃徐樞密師川出知上饒因焚黃次經由翠巖俾門生讀讚而不能句遂自三復擊節其格之新也蘇黃門子由元豐間左遷高安榷管之任而於公餘必與諸山講道為樂景福順禪師者尤篤維桑世契順有三偈寄公故嘗和曰融却無窮事都成一片心此心仍不有從古到如今如今亦如忘相逢笑一場此間無首尾尺寸不煩量要識東坡老堂堂古丈夫近來知此事也不讀文書公將移績溪以書別順曰自來高安唯有二三老僧相知既又蒙公遠來相訪方今南老門人公為第一因此又識南公遺風為幸多矣前日得告當往績溪旦暮成行不獲面違悵仰無窮凝寒法候何如更冀以道自重順後住西山香城其徒以公偈并書刊石尚復存焉陳文惠公閬中人平居於釋氏留心因遊山寺恍然有得而成偈曰殿古寒爐空流塵暗金碧獨坐了無人又得真消息景祐間拜相尋出判鄭州以太子太師致仕居于鄭圃閲四寒暑而薨臨終自志其墓曰有宋頴川先生堯佐字希元號知餘子年八十二不為夭官一品不為賤卿相納祿不為辱三者粗可歸息於父母棲神之域矣吁公於幻妄境中了無遺恨其自謂又得真消息固可與知者道歟湖州報本元禪師其見於林間録謂開法吳江聖壽投黃龍法嗣書南公視其名曰吾偶忘此僧書未欲開可以親至元遂輟住持事即日腰包而來然南公書尺集有答元曰手書達吳江聖壽長老前年永上人自二浙迎金像回得書一封因念汝離黃檗十有餘年一錫飄然孤蹤不定雖知白而守黑奈果熟而自香緣在吳江應時而出宜遵聖賢規範如説而行勿效庸鄙之流唐言自恣凡百住持必須慎護此不盡書也今觀其委曲如是豈偶忘其名耶元嘗有三頌示學者曰儞問西來意傍人意已彰病嫌春冷淡老見事尋常睡裏遊三界惺來夢一場言應言不及得坐細思量儞問西來意余生在廣南官人須漢語百姓只鄉談九夏須紈扇三冬厭綌衫曹溪門大啓應不阻人參儞問西來意同聲了了知博聞非智慧寡學豈愚癡拾得能燒火寒山解作詩咄哉顛蹶漢誰唱羅羅哩中際可遵禪師號野軒早於江湖以詩頌暴所長故叢林目之為遵大言因題廬山湯泉東坡見而和之自是名愈彰無為子楊傑字次公以為道交楊以偈調之曰無孔鐵鎚太重墮在野軒詩頌酸豏氣息全無一向撲入齏甕遵即繼其韻曰無為不甚尊重到處吟詩作頌直饒百發百中未免喚鐘作甕居無何有僧往無為軍持鉢遵以偈送其行且簡次公曰今去無為化有情野軒無物贈君行若從楊傑門前過為我高聲喝一聲楊嘗問道於雪竇門下諸公而遵嗣報本蘭以雪竇為大父云武寧徐龍圖禧字德占早參黃龍晦堂和尚而受印可遂與靈源為法友因致問於靈源曰昔有老宿見人便喚為倒騎牛漢且道如何得不被他恁麼喚靈源對以是他巴鼻在我手裏仍有頌發揮之曰塗中作主門裏出身倒騎順騎誰為最親莫嫌土面塵埃甚百尺竿頭步步新大洪恩禪師與無盡居士張公以禪教之要相與徵詰無盡因謂之曰華嚴注釋古人各有所長如題目七字大清涼得之妙矣始成正覺李長者所具勦絶佛智既無盡無量信乎名句文字所不能詮輸他臨濟劈耳便掌三人公案未知如何試論之恩遂答曰伏蒙剖示清涼李長者臨濟一宗公案理事分明誰敢異議可憐箇不了事漢子被無盡居士一時勘破了也雖然罪不重科既往不咎要之猶有責情三十棒若據令而行轉見盡法無民若放一線道又恐知而故犯於此二途如何即是彼上人者難為酬對只應倒走三千里如別紙故敘乃罄此意也恩仍封別紙示之無盡於封來白紙上書一偈寄恩曰不須倒走三千里何必重科三十藤盡是河沙真寶藏夜寒挑起讀書燈恩乃疏為四偈答之曰不須倒走三千里浩浩清波平地走百尺竿頭笑不休臨濟德山徒側耳何必重科三十藤放行把住此為憑居士傳來應有在三峰鼎峙碧層層盡是河沙真寶藏聊與人間作歸向來時無口問盧能驚怪泥牛吞大象夜寒挑起讀書燈壞衲蒙頭箇老僧慚愧淨名多意氣自憐多病百無能恩嗣投子青公也永道法師者出於東頴沈丘毛氏禮順昌府南羅漢院僧安恭為師既而悵然曰佛之設教廣度群品今不扶護教門力究大乘饒益有情則徒為耳遂趨上都講席業唯識百法二論獲臻其奧繼主左街香積院於天寧節恩例得寶覺大師之號宣和元年正月詔下改僧為德士道偕律師悟明華嚴講師慧日與道士林靈素抗辨邪正訴于朝廷忤旨流道州二年六月依赦量移經由長沙邂逅寂音尊者以詩遺之曰道公膽大過身軀敢逆龍鱗上諫書只欲袒肩擔佛法故甘引頸受誅鋤三年竄逐心無愧萬里歸來貌不枯他日教門綱紀者近聞靴笏趂朝趨尋令逐便七年五月奉旨前寶覺大師毛永道纍經赦宥特與依舊披剃自爾屢蒙恩渥無何建炎初京城留寺元帥宗公服道德義令借補宣教郎充留守司招諭官兼總管使司參謀軍事護佐軍旅俾往淮穎勸慕豪右得錢數萬助國贍軍纍蒙召起行在都堂議事於是宰執力勉返初補授文官兼帶武職分領兵權以佐王室遂成偈辭之曰昔年為法致遭黥天使監防用將兵禁錮南行經半紀往還萬里計途程冰霜未易松筠操爐炭難移鐵石情願與佛陀為弟子不堪輔佐作公卿語雖非工紀實而已尋準三省樞密院賞功司劄子奉聖旨特賜寶覺圓通法濟大師尚書禮部公據云前件師號據祖宗法係是試鴻臚卿崇觀之後改賜六字師號比視品官又承都省劄子旌其護法賜名法道紹興三年二月詣朝廷與道士劉若謙等正祈禱道場所僧道班次其劄略曰緣崇寧大觀間道士王資息林靈素等叨冒資品紊亂朝綱由是起例道壓僧班竊見靖康建炎已來所有道士官資已行追毀既無官蔭須合遵依祖宗舊制伏望朝廷明降指揮特賜改正頒行天下以正風俗是時未蒙與決施行逮紹興十三年十月再行整會僧道班次僧並居東永為定制道於十七年七月二十有七日示寂于臨安府祥符蘭若其辭世偈曰萬法本空一真絶妄如彼太虗元同谷響若夫東都事略謂道士林靈素以左道得幸勢傾一時而道與之抗辨略無撓辭其扶護教門利益有情真不孤初志耳世以伊蒲塞誤為蘋藻無乃沿襲而未之考今觀東漢楚王英傳永平八年詔令天下死罪皆入縑贖英遣郎中令奉黃縑白紈三十匹詣國相曰託在藩輔過惡纍積歡喜天恩奉送縑帛以贖罪愆國相以聞詔報曰楚王講黃老之微言尚浮屠之仁祠潔齋三月與神為誓何嫌何疑常有悔吝其還贖繒以助伊蒲塞桑門之盛饌其傳注曰伊蒲塞即優婆塞中華譯為近住乃稟戒行堪近僧住以是可見非蘋藻矣又桑門即沙門譯為息心瑞應云息心達本源故號為沙門然天竺之國有五所至方言音訛不同若夫比丘比丘尼優婆塞優婆夷謂之四衆既具盛饌而饗則稱為四衆齋亦可矣金山達觀穎禪師為人奇逸智識敏妙書史無不觀詞章亦雅麗與夏英公王文康公歐陽文忠公趙參政平叔遊殊相樂也嘗著性辨曰今古聖賢言性者只得情也脫能窮理不能盡性何也不知三才萬物皆性也天性上人性下金利水濕木直火熱土厚此五行性也統而論之精而察之萬物之性皎然可見矣就中最靈者人也陰陽交遘而生變化而動者情也約人情純粹者也其所以可上可下為賢為愚受性上者君子也外情不能惑性雖混於小人猶金玉之中土石耳至于堯舜禹湯垂名萬古乃當時保高位守常道而察人情隨性立法也桀紂幽厲惑富貴失大寶縱自性被情遷也天地雖無情風雲四時易其候山川萬物亂其形唯人居中度天時隨地利而不失其節所以人為天地心也情意識皆本乎性也隨物所顯故外有多名耳餘不可備敘也情者心也牽於用意者志也記於事識者知也辨於物愛惡喜怒皆情也夫為大聖人者性決定也不被外惑不為情牽性制於情也所以我教謂之正覺者也易唯知窮理盡性之説而未見乎出古入今之道者也蘇翰林子瞻以紹聖元年秋經由南華著衲衣與長老辨公坐次忽客來謁乃著公服遂謂辨曰裏面著衲衣外面著公服大似壓良為賤辨曰外護也少不得蘇曰言中有響辨曰靈山付屬不要忘却已而為作蘇程菴銘其引曰程公菴南華長老辨公為余表弟程德孺作也余南遷過之更其名曰蘇程且銘之辨作菴寶林南程取之不為貪蘇後到住者三蘇既住程則去一彈指三世具如我説無是處百千燈同一光一塵中兩道場齊説法不相妨本無通安有礙程不去蘇不在各遍滿無雜壞程為廣東漕使而辨作是菴也間禪師者初參高菴悟公於雲居悟問鄉里甚處對曰天台悟曰天台石橋倒是否間趨前以手掖悟笑而已悟平居喜舉玄沙示衆因我得禮儞話間聞有省以頌呈悟曰因我禮儞魚腮鳥觜更問如何白雲萬里未幾辭歸故居高自標致繼通安問於悟得其所報曰此事須是力行久久自然靈驗向來因我得禮儞頌可謂通古冠今矣自爾道價四馳為時宗仰郡守革萬年律居而為禪席命間權輿焉烏巨雪堂行禪師視間為猶子遊天台間請其升座行有頌曰因我得禮儞天台石略彴今古往來人幾箇親踏著間之為人莊重能蹤迹其高菴遷數剎而終老於雲居三塔云蔣山佛慧禪師叢林號泉萬卷者有北邙行曰前山後山高峨峨喪車轔轔日日過哀歌幽怨滿巖谷聞者潛悲薤露歌哀歌一聲千載別孝子順孫徒泣血世間何物得堅牢大海須彌竟磨滅人生還如露易晞從來有會終別離苦樂哀戚不暫輟況復百年驚電馳去人悠悠不復至今人不會古人意栽松起石駐墓門欲為死者長年計魂魄悠揚形化土五趣茫茫井輪度今人還葬古人墳今墳古墳無定主洛陽城裏千萬人終為北邙山下塵沈迷不記歸時路為君孤坐長悲辛昔日送人哭長道今為孤墳臥芳草妖狐穿穴藏子孫耕夫撥骨尋珠寶老木蕭蕭生野風東西壞冢連晴空寒食已過誰享祀冢畔餘華寂寞紅日月相催若流矢貧富賢愚盡如此安得同遊長樂鄉縱經劫火無生死觀其詞理悽壯有關教化世之持暴氣溺欲樂者見之宜自警省焉西蜀政書記居百丈山最久而內外典墳靡不該洽至於詩詞雖不雅麗尤多德言圭禪師早從之遊政以詩贈之曰少年詩律如春雨點染萬物發佳處時復一篇出新意瀾錦輕紗脫機杼自知文意費雕刻日益巧偽蔽心腑翻然洗心謀大道超然不與萬法侶車輪峰下從吾遊杲杲素練濯秋渚一染燦然得正色不為朱紫所等伍妙高無處見德雲夢中樓閣啓鑰戶了然心腑不可蔽無煩雕刻得巧語謫仙人在一塵中一一塵中有杜甫根塵界處皆腹藁八萬四千無數句意句圓美若彈丸詠歌不足欲起舞秋風繞樹掃蒼顏園林失翠作岣嶁遠追清興別吾遊泠然不待風為御招此百年未歸客送行天地一逆旅要收春雨點新意他日相逢為君舉圭遂行詣佛眼而得法後住和之褒禪東偏植竹因為退居名曰竹菴有詩種竹百餘箇結茅三兩間才通溪上路不礙屋頭山黃葉水去住白雲風往還平生只這是道者少機關竹菴諱士圭詩選收為道圭作則誤也雲臥菴主書十一月七日豐城曲江感山雲臥菴主曉瑩上狀問訊徑山遁菴無言首座禪師友兄日者禋兄居上藍時蒙以函翰附其遞至展繹真旨開慰之深何啻執熱而濯清風第以相望闊遠殊乏雅便無繇略具稟報可勝愧怍唐顧況有言一別二十年人堪幾回別與兄之違異僂指則踰其數又七寒暑其何以堪耶追懷疇昔道義琢磨之益炯炯此心恍如隔世矣竊承坐分法施開悟多衆苟非辣手段大鉗鎚未易及此故嘗以祇夜寄意於歆艷曰徑山突兀上雲煙高遁山顛絶世緣握以黑蛇分半座却將毒氣噴人天其實祖室重寄有在於是欽仰欽仰即茲冬仲寒冷濅嚴必然覺體於四威儀中日享龍天恭敬之福為樂無涯涘也愚自量命薄才疏跨短步窄難追逐諸友高躅於叢林未免稟志遵分於乾道辛卯縛屋荒山既高寒孤逈老病不堪至淳熙戊戌冬以徒弟隸名感山小寺而徙居焉寺基稅錢三十有一並無常産唯破屋數間如玉川子洛城之居耳親舊憐其謀生計拙奉養清甚相與出資創小輪藏庶幾財法互陳補其日給歲在癸卯徒弟遽歿遂自任其灑掃之責而量柴頭數米顆之外無他念裝懷且圖睡快而已禋兄謝事上藍既到山間樂其幽寂為留十有一月應南源命而遷青原祖席緣法頗盛亦有二三衲子不孤其竹篦用事所用竹篦乃大慧老師在梅陽來報恩為兄弟入室者無著嘗作銘紀其由銘有引曰大慧老師以竹篦揭示佛祖不傳之妙幾四十年遂使臨濟正派勃興焉至於居患難中亦不倦提擊所以梅州報恩有竹篦在堂司也江西瑩仲溫嘗掌其職得之而歸豈特為叢林千載之榮觀邪無著妙總謹稽首為之銘曰南山有竹不削自異狀若黑蚖噴噴毒氣如尺之捶用之無匱鍛聖烹凡經天緯地仲溫得之尤宜保祕照映叢林千古不墜愚渦沈鄉井收得誠為間家具溘然後定被摩那輩將去撥火何如於未蓋棺前以竹篦及無著親寫之銘併歸於禋兄所幸其用得靈驗想兄聞而必為之喜也其山頭兄弟與兄契分厚而過江西愚得復見者唯古岡永兄受仰山命時取道豐城來菴所相訪因送其入院其後遷大溈二年而示寂長溪晦兄住香城亦至山舍及董大溈閲一月而委順建昌圓兄自鵝湖移仰山迃路相尋亦送其至臨江慧力無何領院事七日而西邁然晦圓二兄世緣不假借如此在其分上又何憾焉育王光兄道福如是之盛向來朝遊夕處而不識韋皇是貴人者多矣自其出世收書三四其在靈隱故嘗問之以書曰兄今羽凡骨為飛仙起故魚為雲龍之時如演圓二兄尚未聞人天推轂何邪兄雖不藉其齒牙餘論而道香德風自然藹著其所以問之者庶其不忘持天下叢林之公論也今叢林無公論奈何奈何前夏淨慈密兄以書見寄紆誠盡意不替疇昔祖道正賴其主盟為本色衲子所歸豈謂去夏遽爾踰蔥嶺而去兄必為短氣耳況江湖朋舊雕零如霜葉脫木亦無幾矣殊使人愴然也今華藏璉兄住保安日有書來云祖詠住越之興善已數年在臨安時綴集大慧始末作年譜一册不肯上徑山與前輩看詳急於刊行亦多踈脫愚於是答其書糾其年譜之謬今試為兄略舉數端譜云師再至荊南張無盡問以堯舜禹湯古之聖君而釋典不言何也師云梵王帝釋説法因緣為對其所取簡脫如此適足以增排佛者之誚若據當時所問所答極有理趣而老師嘗於紹興九年間與尹侍講彥明説尹首肯者再三即非對以梵王請佛説法因緣愚以其詳具於雲臥紀談茲不欲縷陳又讚草堂像則是十年寶峰化主求之於徑山其時草堂尚無恙故有小根魔子還知否此是吾家真白眉之句乃非十三年作於衡陽也又李參政泰發所贈絶句其引云適衡聞州郡欲免旬呈師毅然不可曰無以我纍人此意豈流俗泛泛者所能窺之哉感歎成小詩曰十畝荒園旋結茅芥菘挑盡到同蒿聖恩未許還磨衲且向階前轉幾遭蓋十一年冬間非二十年也大慧初到衡陽菴於城中廖司戶西園其譜改十畝作十里在衡陽城豈容十里園邪又改同蒿作蓬蒿且蓬非可食之菜然參政公之詩如唐高力士責峽州詠薺菜而寄意焉其譜中有作説踈謬處謾為兄略言其數段如云梅為南方煙瘴之郡醫藥極少東歸而不霑霈澤者六十有三既無人字則是何物若是人而死煙瘴蓋為法忘軀之士既非罪責豈可不霑霈澤邪昔徐師川在昭州有詩曰嶺外昭州最瘴煙華人罪大此為遷老夫無罪緣何事也向昭州住半年其死於梅州六十有三人可比類徐公在昭州也又云師居梅州衲子追隨於荒寒寂寞之濵丐一言冀一盼以為終身慰幸足可下視諸方若爾則適足取笑諸方以老師參徒非標志於宗門本分事乃東山頌今者叢林走大聲之謂也又云紹興甲戌在梅州以臨濟正宗法語付法宏首座道先侍者宏既不得其死於梅陽而先亦死於徑山侍寮宏先既死則正宗法語付之誰邪今不得正宗法語付授而嗣法者則何以藉口此所謂華詞損實耳昔圜悟在蜀嘗以衣并鉢寄來泉南與老師是時老師有偈曰付來鐵鉢盛貓飯磨衲袈裟入墨盆祖宗活計都壞了不知將底付兒孫老師既施為如此何必獨收正宗法語付宏先也又云兄與璉密禋於老師語録節其綱要離為五册既節則是刪繁去冗然其間不無去取似不當揭示於世徒使叢林增阿難眊矣之歎也又有按事出武庫者却不敘武庫所出端由今略敘武庫之權輿乃紹興十年春信無言數輩在徑山以前後聞老師語古道今聚而成編福清真兄戲以晉書杜預傳中武庫二字為名至十一年四月間老師升座而張侍郎與法會老師因説張魏公之兄昭遠參圜悟而圜悟謂其為鐵剗禪今山僧却謂侍郎禪為神臂弓未免以偈見意曰神臂弓一發穿過千重甲子細拈來看當甚臭皮襪次日侍郎請升座而台州了因禪客致問曰神臂弓一發千重關鎖一時開吹毛劒一揮萬劫疑情悉皆破猶是生死岸頭事作家相見時如何師曰拖出這死尸進云和尚為誰恁麼道師云棺木裏瞪眼進云此未是學人問處師云儞問處又作麼生進云把手上高山師云非儞境界進云毒蛇頭上也要揩癢師云儞不是這般人進云若不登龍門焉知滄海闊師云爭奈已遭點額逮五月間侍郎遭臺評被及老師有衡陽之行蓋是時朝廷議兵而神臂弓之論頗紛紜所以侍郎答何中丞書有除帥在月末之語已而張徽猷昭遠有偈嘲老師曰小菴菴主放憨癡愛向人前説是非只因一句臭皮襪幾乎斷送老頭皮由是山頭識者莫不以武庫二字為憂故千僧閣首座江州能兄揭榜子於閣門曰近見兄弟録得老師尋常説話編成册子題名武庫恐於老師有所不便可改為雜録則無害焉其後又偽作李參政漢老跋而以紹興辛酉上元日書于小溪草堂之上其實老師則不知有武庫及於紹興庚午在衡陽見一道者寫册取而讀則曰其間亦有是我説話何得名為武庫遂曰今後得暇説百件與叢林結緣而易其名未幾移梅陽至癸酉夏宏首座以前語伸請於是間坐間有説則宏録之自大呂申公執政至保寧勇禪師四明人乃五十五段而罷興時福州禮兄亦與編次宏遂以老師洋嶼衆寮榜其門有兄弟參禪不得多是雜毒入心之語取稟而立為雜毒海宏之親録為德侍者收禮之親録在愚處禮之録其中尚有説雲蓋古和尚叢林謂古慕固者頌狗子無佛性話曰趙州狗子無佛性終日庭前睡不驚狂風打落古松子起來連吠兩三聲老師曰此吟狗子詩也禮之小楷筆力精徑殊有風韻蓋出之於晉宋法帖耳又譜中於二十年收四句詩而不敘其由但云皆預讖嶺海之意詩曰鴈回始覺瀟湘遠石鼓灘頭莫怨天一住十年秦楚隔木弓重續舊因緣蓋是雪峰聞兄於紹興十二年從衡陽來臨安見有以西蜀費孝先之術設肆而為人決休咎聞因以老師問焉故有是詩也衡陽有回鴈峰瀟湘有石鼓灘而辛酉至庚午移梅陽則十年或云古以梅木為弓未詳所出若以卦詩較老師衡陽之事可謂奇中矣又譜中收而使人不可曉者如云華藥寺慶懺鐘樓小參説偈戲操閩音用其里語後以杜牧之詩驚起暮天沙上鴈為斷句愚嘗聞筠陽瑫兄説仰山鐘樓壁間舊有題云突然架起一間屋中心懸箇鐵琅璫驚起暮天沙上鴈海門斜去兩三行以老師與竹菴在仰山時嘗登樓讀而為笑及於華藥小參舉以為法樂若謂海門為讖則老師未嘗過海門何讖之有哉又譜收祭圜悟文不動軒記已見於泉南刊舟峰文集則是其代亦不必收為老師作也至於臨示寂遺奏四十二字乃親迹而却不收遂收愚所録囑嗣法委曲之語然愚是時於喪司職在掌記所以於語之結尾明説是口授侍者令録以為別此所謂老夫常談何足收邪又譜云師隆興癸未三月聞王師凱旋作偈有氛埃一掃蕩然空之句然偈初欲以進而未果真迹在賢兄處賢卒而流落為仰山權兄收偈前有臣某甲上進五字氛埃一掃蕩然空百二山河在掌中世出世間俱了了當陽不昧主人公若此偈可全收而却不爾譜末云奪食驅耕斷橋塞路蓋遊戲耳若以是為遊戲可乎此所謂妄言傷正也前輩曰奪食驅耕手段辣茲可見宗師體裁耳又云其所攝化傾倉倒廩墮珥遺簪唯恐不適師意則人情相奉而非歸依至道從其攝化也其墮珥遺簪則是遺失墮落而非韓文公所謂越商胡賈脫身獻耳譜中間有按塔銘而並無按正續傳至於有數段按師謂侍者若是説話初無定論既非上紙筆何可言按俗諺所謂口説無憑也又譜跋云採托正續傳所不載者集為年譜及觀譜之所收盡出於正續傳何得為不載邪興國軍安兄作建康出隊先馳歸謂愚曰老師緣秦太師有親戚命升座乃言我雖被太師編管十七年未嘗敢怨他其實事有前定也遂引東山受業院於崇寧甲申塑佛有異人丁生便謂像有難則人來出家像毀則人有難若較我平生事時日無差豈不是前定邪士大夫聞者靡不服其達也正續傳首載此事而譜却按為定上座普説而説然説事有由不若為秦太師親戚説者為優耳試於廣録檢尋於定普説有無便見其鑿空造端欺誑於世也紹興丙子秋老師曾於鄂渚舟中以愚生緣洪州顧而謂曰洪州出得幾箇尊宿如寶峰月海會從雲峰悅輩甚生次第又云我年十九遊隱靜杯渡菴其菴主説所夢便謂我是雲峰悅和尚後身及到瑞竹珵和尚處却道我是再來人是時老師説得甚詳故嘗備載於雲臥紀談而譜中只説珵説為再來人却不能收雲峰後身之事然老師屢説而叢林知者亦衆也所以向來對靈文故云舉世知雲峰悅老之後身逢時獲南嶽讓公之前號蓋讓公亦賜大慧禪師也江西近有一僧撰隆興佛運統紀凡兩巨編印行以初祖迦葉於周懿王四年庚寅入雞足山而傳燈録載却是孝王五年丙辰也其差紊二十八年於迦葉尚如此餘可知矣又收晉懷帝為劉曜使衣青衣而行酒及東晉孝武帝晚年長星現而舉酒祝曰長星勸爾一杯酒觀其二事何與佛運邪愚因見統紀無足取遂用小青江紙一幅上畫小佛兩旁畫八十眼於每眼中只寫四字如甲寅示生至壬申入滅之數其下敘化迹七百餘字名曰釋迦文佛住世圖其敘説法年時略曰初詣鹿苑開演二乘其癸未至甲午唯談生滅是為阿含經聲聞小乘也其次乙未至壬寅説方等諸大乘經彈訶二乘令耻小慕大其次癸卯至甲子説般若諸經融通二乘令心通泰其次乙丑至壬申説法華涅槃等經開權顯實指小即大混而為一所謂身住世七十九年而教談三百餘會也愚向嘗與池州南道者議欲撰老師住世圖今亦不復措意矣南與述首座字無己者是鄉人也述同老師在京師圜悟會中而至雲居知老師出處之詳無如述也南與之同行其聞見可知也老師初住徑山述作先馳與首座勘辨亦有機語由是叢林只呼為述先馳嘗隨過衡陽既移梅陽而述歸鄉首衆僧於梅山愚丘禪師席端而卒愚平時與南親密每聞其語叢林典故也愚又因見吉州禾山方和尚令福唐祖一書記所編死心行狀及較舟峰續僧寶傳則沒交涉其傳則謂初謁棲賢秀次之黃龍參晦堂會坐下板知事捶行者聞杖聲而悟晚住黃龍退居晦堂夜參有乞末後句與偈泊然而逝而行狀則謂初謁晦堂於黃龍閲九載一夕燕坐微困聞雷大震廓然契悟又經九載方離黃龍遍參而至棲賢謁秀鐵面及再住黃龍往大莊寫鼓樓牌為安心閣體中不佳院衆來請歸遂厲聲曰吾以大千為家何院之歸乎況衲僧家胡往不利哉藏主僧慧宣曰和尚宜自警省師蹶起曰川僧我這裏事定於是泊然而逝是時靈源居昭默堂以偈告死心靈席其偈有敘曰伏念十三日承降弊寮碾茶具食笑語甚歡且舉昨日答舒州朝請徐師川甘露真乘書其語委曲和軟異乎平時復舉今早答隱靜祖印書云渠已作壽塔云彼此老大今後不必寄書來也食罷從容説話乃去至次日晚間報和尚早晨出莊齋後似不快恐今夕不歸十五日早聞已歸寂某力病登方丈見趺坐顏貌睟然如平常身體溫軟但問不復應矣唯是不應亦涉呶呶然知者方知其如未具無耳之聽者何因著偈以告于靈席噫慈音正色尚能為我發忉忉之誚乎偈曰平生詆真語正色無忌諱垂滅流軟音向人真有謂於余尤更勤煮茗羅珍味那知越夕間遽作翻身勢聞登方丈觀跏趺貌和睟問焉不余應即承親説示其如有耳人難聽無聲義何當妙寂中等復演玄祕然其偈敘與行狀同而與傳則不同矣其傳既行其行狀則無聞於叢林也死心可謂命世大宗師其平時出處叢林不得聞其詳是可太息也愚向雖謬用其心以所聞所見綴成大慧正續傳無垢聞道傳無著投機傳庶幾於後文章宗工如孫尚書仲益作圜悟傳秀紫芝作歐陽文忠公傳而不至如舟峰作死心傳之踈脫耳中昨雪峰聞兄雲居熙兄並欲以傳鋟木而力拒其不可者其中必有不合輿議處若不鋟木尚可改易若鋟木則是以管見而欺當時會中朋舊謂秦無人也靈源作晦堂行狀有云早不奉戒律且逢橫逆天柱靜公以書力詆其不當言又踈山如公編次草堂行録有日持心經一藏以般若力資雲巖造藏而東山空公以書糾其非是其靈源踈山智高識博尚取詬於同列況他人哉然正續所收嗣法止於在洋嶼小溪前住徑山受記莂者其衡梅與再住徑山並無與焉至於收無著者蓋依倣達磨傳載尼總持在於無著則不忝耳今聞光二兄法子法孫棊布名山以傳不收其師必怒罵生滅也昔靈源著五祖演和尚正續銘而無圜悟名但佛鑑佛眼而已蓋是時圜悟出世西蜀而道聲未及南方孟子所謂盡信書不如無書也雪堂作佛眼正續記久已刊行兄曾見否前得兄書有言不附承動靜已十年登時口占一偈曰吳楚相望亦遠哉十年方得一書來世無百歲之人也縱有書來能幾回彼此書尺踈得往復其道義於大圓鏡中豈有踈闊哉昨於待來之人剽聞兄力却秀峰之命而今而後設使有援薛廷望請德山故事必難施其計故嘗有二偈奉懷曰自從相別幾經年湖海唯聞道價傳以遁名菴真箇遁獻華無路在諸天又曰聞道秀峰招不去想於雙徑作終焉既然穴鼻圖高臥敢問時人作麼穿謾録去聊博一笑耳愚行年六十有八而來無多前輩所謂人生七十鬼為鄰則近之矣今俱老大相望闊遠必無荐見之因懷抱何由軒豁既形於紙筆未免䌤縷相告以兄為知言之人故也即日願言齋息是衛永永眉壽以副叢林依嚮此外無可為祝不宣曉瑩再拜
